<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d47a1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1565c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976d2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffeb3b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9800;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Decorative elements -->
  <circle cx="1050" cy="150" r="200" fill="rgba(255,255,255,0.04)" />
  <circle cx="200" cy="500" r="130" fill="rgba(255,255,255,0.04)" />
  <!-- Top accent bar -->
  <rect x="80" y="80" width="6" height="100" fill="url(#accent)" rx="3" />
  <!-- Category labels -->
  <rect x="100" y="82" width="110" height="36" rx="18" fill="rgba(255,235,59,0.2)" />
  <text x="155" y="106" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="18" fill="#ffeb3b" text-anchor="middle" font-weight="700">드라마</text>
  <rect x="225" y="82" width="120" height="36" rx="18" fill="rgba(255,255,255,0.1)" />
  <text x="285" y="106" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="18" fill="#ffffff" text-anchor="middle" font-weight="600">3월 총정리</text>
  <!-- Main title line 1 -->
  <text x="80" y="220" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="64" fill="#ffffff" font-weight="900" letter-spacing="-2">2026년 3월 신작 드라마</text>
  <!-- Main title line 2 -->
  <text x="80" y="300" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="56" fill="#ffeb3b" font-weight="900" letter-spacing="-2">라인업 총정리</text>
  <!-- Divider -->
  <rect x="80" y="330" width="560" height="3" fill="url(#accent)" rx="1.5" />
  <!-- Subtitle -->
  <text x="80" y="383" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="32" fill="#90caf9" font-weight="600">신이랑 법률사무소 · 사랑하는 남자는 모두 죽는다</text>
  <!-- OTT tags -->
  <text x="80" y="435" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="28" fill="#bbdefb" font-weight="500">넷플릭스 · 티빙 · 쿠팡플레이 OTT 비교 가이드</text>
  <!-- Bottom tag -->
  <text x="80" y="485" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="24" fill="rgba(255,255,255,0.5)" font-weight="400">유연석 · 박민영 · 위하준 복귀작  |  2026년 봄 시즌</text>
  <!-- Bottom brand -->
  <text x="1120" y="590" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="20" fill="rgba(255,255,255,0.3)" text-anchor="end">ambitstock.com</text>
</svg>
