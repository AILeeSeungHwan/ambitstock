<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e50914;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Decorative circle (samsara wheel) -->
  <circle cx="960" cy="315" r="220" fill="none" stroke="#e50914" stroke-width="1.5" opacity="0.2"/>
  <circle cx="960" cy="315" r="160" fill="none" stroke="#e50914" stroke-width="1" opacity="0.15"/>
  <circle cx="960" cy="315" r="100" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.12"/>
  <!-- Spokes -->
  <line x1="960" y1="95" x2="960" y2="535" stroke="#e50914" stroke-width="1" opacity="0.1"/>
  <line x1="740" y1="315" x2="1180" y2="315" stroke="#e50914" stroke-width="1" opacity="0.1"/>
  <line x1="804" y1="159" x2="1116" y2="471" stroke="#e50914" stroke-width="1" opacity="0.1"/>
  <line x1="1116" y1="159" x2="804" y2="471" stroke="#e50914" stroke-width="1" opacity="0.1"/>
  <!-- Category badge -->
  <rect x="80" y="72" width="130" height="36" rx="4" fill="url(#accent)" />
  <text x="145" y="96" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">결말 해석</text>
  <!-- BEEF label -->
  <text x="80" y="168" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="22" font-weight="400" fill="#ff6b6b" letter-spacing="3">BEEF Season 2 · Netflix</text>
  <!-- Main title line 1 -->
  <text x="80" y="260" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="64" font-weight="900" fill="white">성난사람들2</text>
  <!-- Main title line 2 -->
  <text x="80" y="340" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="52" font-weight="700" fill="white">결말 해석</text>
  <!-- Subtitle -->
  <text x="80" y="410" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="30" font-weight="400" fill="#adb5bd">삼사라의 바퀴 · Josh 체포 · 8년 후 에필로그</text>
  <!-- Bottom divider -->
  <rect x="80" y="460" width="560" height="3" fill="url(#accent)" rx="2"/>
  <!-- Bottom info -->
  <text x="80" y="505" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="18" fill="#868e96">스포일러 포함 · 에피소드 8 완전 분석</text>
  <text x="80" y="535" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="18" fill="#868e96">ambitstock.com</text>
</svg>
