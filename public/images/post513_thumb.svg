<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004d40;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00695c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00897b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffeb3b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffc107;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Decorative elements -->
  <circle cx="1000" cy="80" r="200" fill="rgba(255,255,255,0.04)" />
  <circle cx="100" cy="500" r="150" fill="rgba(255,255,255,0.04)" />
  <polygon points="1100,300 1150,400 1050,400" fill="rgba(255,235,59,0.06)" />
  <!-- Top accent bar -->
  <rect x="80" y="80" width="6" height="100" fill="url(#accent)" rx="3" />
  <!-- Category label -->
  <rect x="100" y="82" width="140" height="36" rx="18" fill="rgba(255,235,59,0.2)" />
  <text x="170" y="106" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="18" fill="#ffeb3b" text-anchor="middle" font-weight="700">애니메이션</text>
  <!-- Platform badge -->
  <rect x="260" y="82" width="100" height="36" rx="18" fill="rgba(255,255,255,0.1)" />
  <text x="310" y="106" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="18" fill="#ffffff" text-anchor="middle" font-weight="600">티빙</text>
  <!-- Main title -->
  <text x="80" y="240" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="96" fill="#ffffff" font-weight="900" letter-spacing="-3">테러맨</text>
  <!-- Subtitle line -->
  <text x="80" y="315" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="40" fill="#80cbc4" font-weight="700">티빙 오리지널 애니메이션</text>
  <!-- Divider -->
  <rect x="80" y="348" width="480" height="3" fill="url(#accent)" rx="1.5" />
  <!-- Stats row -->
  <text x="80" y="400" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="30" fill="#b2dfdb" font-weight="500">네이버웹툰 원작  ·  슈퍼스트링 유니버스</text>
  <!-- Bottom tag -->
  <text x="80" y="458" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="26" fill="rgba(255,255,255,0.5)" font-weight="400">다크 히어로 성장 서사  ·  2026년 1월 공개</text>
  <!-- Bottom brand -->
  <text x="1120" y="590" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="20" fill="rgba(255,255,255,0.3)" text-anchor="end">ambitstock.com</text>
</svg>
