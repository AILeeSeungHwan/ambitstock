<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5ba4cf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="skyYellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#00000044"/>
    </filter>
  </defs>
  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Cloud-like decorative circles -->
  <ellipse cx="150" cy="120" rx="180" ry="80" fill="#ffffff" opacity="0.15"/>
  <ellipse cx="1050" cy="160" rx="200" ry="90" fill="#ffffff" opacity="0.12"/>
  <ellipse cx="600" cy="520" rx="350" ry="120" fill="#FFD700" opacity="0.15"/>
  <!-- Top accent -->
  <rect x="0" y="0" width="1200" height="6" fill="#FFD700" />
  <!-- PIXAR badge -->
  <rect x="80" y="75" width="120" height="38" rx="6" fill="#ffffff"/>
  <text x="140" y="102" font-family="Arial Black, Arial, sans-serif" font-size="20" font-weight="900" fill="#0057a8" text-anchor="middle">PIXAR</text>
  <!-- Disney badge -->
  <rect x="218" y="75" width="130" height="38" rx="6" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <text x="283" y="102" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">DISNEY</text>
  <!-- Main title -->
  <text x="600" y="255" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="104" font-weight="900" fill="#ffffff" text-anchor="middle" filter="url(#shadow)">토이스토리 5</text>
  <!-- Yellow underline accent -->
  <rect x="220" y="278" width="760" height="5" rx="2" fill="#FFD700" opacity="0.9"/>
  <!-- Subtitle -->
  <text x="600" y="350" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="36" font-weight="400" fill="#ffffff" text-anchor="middle" filter="url(#shadow)">7년 만의 귀환 — 장난감 시대의 종말?</text>
  <!-- Date badge -->
  <rect x="400" y="400" width="400" height="56" rx="28" fill="#FFD700"/>
  <text x="600" y="436" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="26" font-weight="900" fill="#1a1a1a" text-anchor="middle">2026년 6월 19일 개봉</text>
  <!-- Cast info -->
  <text x="600" y="515" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" opacity="0.9">톰 행크스 · 팀 알렌 · 조안 쿠삭 복귀</text>
  <!-- Director -->
  <text x="600" y="548" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle" opacity="0.8">감독 · 각본: 앤드루 스탠턴</text>
  <!-- Site label -->
  <text x="600" y="600" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" opacity="0.6">ambitstock.com</text>
</svg>
