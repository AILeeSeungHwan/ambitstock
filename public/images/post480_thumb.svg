<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d47a1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a73e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.45" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#overlay)" />

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="200" fill="#ffffff" fill-opacity="0.04" />
  <circle cx="150" cy="500" r="160" fill="#ffffff" fill-opacity="0.04" />

  <!-- Accent line -->
  <rect x="60" y="290" width="6" height="100" fill="#FFD700" opacity="0.8" rx="3" />

  <!-- Category badge -->
  <rect x="60" y="60" width="150" height="42" rx="21" fill="#ffffff" fill-opacity="0.2" />
  <text x="135" y="88" font-family="'Noto Sans KR', Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">영화추천</text>

  <!-- Moon icon representation -->
  <text x="1060" y="220" font-family="Arial, sans-serif" font-size="100" fill="#ffffff" fill-opacity="0.12" text-anchor="middle">🌙</text>

  <!-- Main title -->
  <text x="60" y="220" font-family="'Noto Sans KR', Arial, sans-serif" font-size="60" font-weight="900" fill="#ffffff" letter-spacing="-1">넷플릭스 공포영화 추천</text>
  <text x="60" y="300" font-family="'Noto Sans KR', Arial, sans-serif" font-size="50" font-weight="900" fill="#ffffff" letter-spacing="-1">밤에 혼자 볼 때</text>

  <!-- Subtitle -->
  <text x="60" y="370" font-family="'Noto Sans KR', Arial, sans-serif" font-size="28" font-weight="600" fill="#FFD700">공포 강도별 분류 — 가볍게부터 진짜 무서운 것까지</text>

  <!-- Level badges -->
  <rect x="60" y="415" width="200" height="44" rx="22" fill="#43a047" fill-opacity="0.85" />
  <text x="160" y="443" font-family="'Noto Sans KR', Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">강도 낮음</text>

  <rect x="278" y="415" width="200" height="44" rx="22" fill="#fb8c00" fill-opacity="0.85" />
  <text x="378" y="443" font-family="'Noto Sans KR', Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">강도 중간</text>

  <rect x="496" y="415" width="200" height="44" rx="22" fill="#e53935" fill-opacity="0.9" />
  <text x="596" y="443" font-family="'Noto Sans KR', Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">강도 높음</text>

  <!-- Footer -->
  <line x1="60" y1="540" x2="1140" y2="540" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1" />
  <text x="60" y="575" font-family="'Noto Sans KR', Arial, sans-serif" font-size="18" fill="#ffffff" fill-opacity="0.7">R의 필름공장 | ambitstock.com</text>
  <text x="1140" y="575" font-family="'Noto Sans KR', Arial, sans-serif" font-size="18" fill="#FFD700" fill-opacity="0.9" text-anchor="end">#넷플릭스 #공포영화 #호러추천</text>
</svg>
