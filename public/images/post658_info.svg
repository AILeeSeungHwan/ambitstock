  <text x="580" y="330" font-size="16" fill="#aaa" text-anchor="middle">분당 최고</text>
  <text x="580" y="350" font-size="13" fill="#ffcc02" text-anchor="middle">★ 최고점</text>

  <!-- 하단 설명 -->
  <rect x="40" y="375" width="720" height="36" rx="8" fill="rgba(255,255,255,0.05)"/>
  <text x="400" y="399" font-size="14" fill="#9ca3af" text-anchor="middle">동시간대 금토 1위 · 2054 시청률 5.3% 토요일 전체 1위 · 디즈니+ 글로벌 동시 방영</text>
