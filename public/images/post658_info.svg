<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a0080" />
      <stop offset="100%" style="stop-color:#6a1b9a" />
    </linearGradient>
  </defs>
  <rect width="800" height="420" rx="16" fill="#1a1a2e"/>
  <rect x="0" y="0" width="800" height="70" rx="16" fill="url(#hdr)"/>
  <rect x="0" y="54" width="800" height="16" fill="url(#hdr)"/>
  <text x="400" y="46" font-family="'Noto Sans KR', sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">21세기 대군부인 — 시청률 추이 (전국 기준)</text>

  <!-- 배경 격자 -->
  <line x1="90" y1="100" x2="740" y2="100" stroke="#2a2a4a" stroke-width="1"/>
  <line x1="90" y1="150" x2="740" y2="150" stroke="#2a2a4a" stroke-width="1"/>
  <line x1="90" y1="200" x2="740" y2="200" stroke="#2a2a4a" stroke-width="1"/>
  <line x1="90" y1="250" x2="740" y2="250" stroke="#2a2a4a" stroke-width="1"/>
  <line x1="90" y1="300" x2="740" y2="300" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Y축 레이블 -->
  <text x="80" y="104" font-size="14" fill="#888" text-anchor="end">12%</text>
  <text x="80" y="154" font-size="14" fill="#888" text-anchor="end">10%</text>
  <text x="80" y="204" font-size="14" fill="#888" text-anchor="end">8%</text>
  <text x="80" y="254" font-size="14" fill="#888" text-anchor="end">6%</text>
  <text x="80" y="304" font-size="14" fill="#888" text-anchor="end">4%</text>

  <!-- 1회 막대 (7.8%) -->
  <rect x="160" y="205" width="120" height="95" rx="6" fill="#7c3aed"/>
  <text x="220" y="195" font-size="18" font-weight="700" fill="#c4b5fd" text-anchor="middle">7.8%</text>
  <text x="220" y="330" font-size="16" fill="#aaa" text-anchor="middle">1회</text>
  <text x="220" y="350" font-size="13" fill="#666" text-anchor="middle">4/10(금)</text>

  <!-- 2회 막대 (9.5%) -->
  <rect x="340" y="155" width="120" height="145" rx="6" fill="#9333ea"/>
  <text x="400" y="145" font-size="18" font-weight="700" fill="#d8b4fe" text-anchor="middle">9.5%</text>
  <text x="400" y="330" font-size="16" fill="#aaa" text-anchor="middle">2회</text>
  <text x="400" y="350" font-size="13" fill="#666" text-anchor="middle">4/11(토)</text>

  <!-- 분당 최고 막대 (11.1%) -->
  <rect x="520" y="117" width="120" height="183" rx="6" fill="#ffcc02"/>
