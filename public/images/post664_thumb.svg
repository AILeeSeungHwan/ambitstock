<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a1b9a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a148c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e91e63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ad1457;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="0" y="0" width="1200" height="4" fill="#e91e63" />
  <rect x="0" y="626" width="1200" height="4" fill="#e91e63" />
  <!-- 배경 장식 원 -->
  <circle cx="1050" cy="120" r="180" fill="white" fill-opacity="0.04" />
  <circle cx="150" cy="500" r="140" fill="white" fill-opacity="0.04" />
  <!-- 배지 -->
  <rect x="80" y="80" width="160" height="40" rx="20" fill="url(#badge)" />
  <text x="160" y="106" font-family="'Noto Sans KR', Arial, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">SBS 수목드라마</text>
  <!-- D-DAY 배지 -->
  <rect x="260" y="80" width="140" height="40" rx="20" fill="#ff6f00" fill-opacity="0.9" />
  <text x="330" y="106" font-family="'Noto Sans KR', Arial, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">D-6</text>
  <!-- 메인 제목 -->
  <text x="80" y="200" font-family="'Noto Sans KR', Arial, sans-serif" font-size="72" font-weight="900" fill="white">오늘도</text>
  <text x="80" y="285" font-family="'Noto Sans KR', Arial, sans-serif" font-size="72" font-weight="900" fill="white">매진했습니다</text>
  <!-- 부제 -->
  <text x="80" y="360" font-family="'Noto Sans KR', Arial, sans-serif" font-size="30" fill="#ce93d8">안효섭 × 채원빈  |  4월 22일 첫방</text>
  <!-- 구분선 -->
  <rect x="80" y="395" width="600" height="2" fill="#e91e63" fill-opacity="0.6" />
  <!-- 키워드 태그들 -->
  <rect x="80" y="415" width="130" height="36" rx="18" fill="white" fill-opacity="0.12" />
  <text x="145" y="438" font-family="'Noto Sans KR', Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">힐링 로코</text>
  <rect x="225" y="415" width="120" height="36" rx="18" fill="white" fill-opacity="0.12" />
  <text x="285" y="438" font-family="'Noto Sans KR', Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">12부작</text>
  <rect x="360" y="415" width="150" height="36" rx="18" fill="white" fill-opacity="0.12" />
  <text x="435" y="438" font-family="'Noto Sans KR', Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">밤 9시 방영</text>
  <!-- 출처 -->
  <text x="80" y="570" font-family="'Noto Sans KR', Arial, sans-serif" font-size="18" fill="white" fill-opacity="0.5">ambitstock.com  |  2026.04.16</text>
