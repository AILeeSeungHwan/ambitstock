<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#2d1810"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="630" fill="rgba(0,0,0,0.3)"/>
  <!-- 금색 장식 라인 -->
  <rect x="80" y="120" width="120" height="4" fill="#daa520" rx="2"/>
  <rect x="80" y="500" width="1040" height="2" fill="rgba(218,165,32,0.3)"/>
  <!-- 메인 타이틀 -->
  <text x="600" y="240" font-family="'Noto Sans KR', sans-serif" font-size="72" font-weight="900" fill="#daa520" text-anchor="middle" letter-spacing="8">골드랜드</text>
  <!-- 서브 타이틀 -->
  <text x="600" y="320" font-family="'Noto Sans KR', sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle">박보영 × 이광수 × 김성철</text>
  <text x="600" y="370" font-family="'Noto Sans KR', sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.8)" text-anchor="middle">공조 감독의 첫 시리즈 | 1500억 욕망 스릴러</text>
  <!-- 플랫폼 + 날짜 -->
  <rect x="440" y="420" width="320" height="44" rx="22" fill="rgba(218,165,32,0.2)" stroke="#daa520" stroke-width="1"/>
  <text x="600" y="449" font-family="'Noto Sans KR', sans-serif" font-size="20" font-weight="600" fill="#daa520" text-anchor="middle">디즈니+ | 4월 29일 공개</text>
  <!-- 하단 출처 -->
  <text x="600" y="580" font-family="'Noto Sans KR', sans-serif" font-size="16" fill="rgba(255,255,255,0.4)" text-anchor="middle">ambitstock.com | R의 필름공장</text>
</svg>
