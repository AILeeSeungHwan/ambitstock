  </defs>
  <rect width="1200" height="630" fill="url(#bg483)"/>
  <rect width="1200" height="630" fill="url(#goldglow483)"/>
  <!-- Film strip decorative motif (right side, vertical) -->
  <rect x="920" y="60" width="80" height="510" rx="6" fill="none" stroke="#c9a94e" stroke-width="1.5" stroke-opacity="0.20"/>
  <rect x="927" y="60" width="66" height="510" rx="4" fill="#c9a94e" fill-opacity="0.04"/>
  <!-- Film perforations (top and bottom rows) -->
  <rect x="927" y="70" width="14" height="20" rx="3" fill="#c9a94e" fill-opacity="0.15"/>
  <rect x="949" y="70" width="14" height="20" rx="3" fill="#c9a94e" fill-opacity="0.15"/>
  <rect x="971" y="70" width="14" height="20" rx="3" fill="#c9a94e" fill-opacity="0.15"/>
  <rect x="927" y="540" width="14" height="20" rx="3" fill="#c9a94e" fill-opacity="0.15"/>
  <rect x="949" y="540" width="14" height="20" rx="3" fill="#c9a94e" fill-opacity="0.15"/>
  <rect x="971" y="540" width="14" height="20" rx="3" fill="#c9a94e" fill-opacity="0.15"/>
  <!-- Film frames -->
  <rect x="930" y="105" width="60" height="80" rx="3" fill="#c9a94e" fill-opacity="0.08" stroke="#c9a94e" stroke-width="0.8" stroke-opacity="0.18"/>
