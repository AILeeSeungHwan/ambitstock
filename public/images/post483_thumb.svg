  <rect x="930" y="390" width="60" height="80" rx="3" fill="#c9a94e" fill-opacity="0.08" stroke="#c9a94e" stroke-width="0.8" stroke-opacity="0.18"/>
  <rect x="930" y="485" width="60" height="60" rx="3" fill="#c9a94e" fill-opacity="0.08" stroke="#c9a94e" stroke-width="0.8" stroke-opacity="0.18"/>
  <!-- Second film strip (offset) -->
  <rect x="1040" y="80" width="60" height="470" rx="5" fill="none" stroke="#c9a94e" stroke-width="1" stroke-opacity="0.13"/>
  <rect x="1046" y="115" width="48" height="70" rx="3" fill="#c9a94e" fill-opacity="0.06" stroke="#c9a94e" stroke-width="0.6" stroke-opacity="0.12"/>
  <rect x="1046" y="200" width="48" height="70" rx="3" fill="#c9a94e" fill-opacity="0.06" stroke="#c9a94e" stroke-width="0.6" stroke-opacity="0.12"/>
  <rect x="1046" y="285" width="48" height="70" rx="3" fill="#c9a94e" fill-opacity="0.06" stroke="#c9a94e" stroke-width="0.6" stroke-opacity="0.12"/>
