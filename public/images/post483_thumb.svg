  <circle cx="1140" cy="490" r="50" fill="none" stroke="#c9a94e" stroke-width="1.2" stroke-opacity="0.18"/>
  <circle cx="1140" cy="490" r="35" fill="none" stroke="#c9a94e" stroke-width="1" stroke-opacity="0.13"/>
