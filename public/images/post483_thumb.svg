<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="0" y="0" width="1200" height="630" fill="rgba(0,0,0,0.25)" />
  <!-- Decorative lines -->
  <line x1="60" y1="60" x2="400" y2="60" stroke="#FFD700" stroke-width="3" opacity="0.6"/>
  <line x1="60" y1="570" x2="400" y2="570" stroke="#FFD700" stroke-width="3" opacity="0.6"/>
  <!-- Category tag -->
  <rect x="60" y="80" width="160" height="40" rx="6" fill="#FFD700" />
  <text x="140" y="107" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a" text-anchor="middle">영화추천</text>
  <!-- Main title -->
  <text x="600" y="240" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">봉준호 감독</text>
  <text x="600" y="330" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#ffffff" text-anchor="middle">전작 가이드</text>
  <!-- Subtitle -->
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="36" fill="#FFD700" text-anchor="middle">살인의 추억부터 미키 17까지</text>
  <text x="600" y="470" font-family="Arial, sans-serif" font-size="30" fill="#e0e0e0" text-anchor="middle">입문자를 위한 추천 순서</text>
  <!-- Footer -->
  <rect x="0" y="570" width="1200" height="60" fill="rgba(0,0,0,0.4)" />
  <text x="600" y="608" font-family="Arial, sans-serif" font-size="22" fill="#bbbbbb" text-anchor="middle">R의 필름공장 | ambitstock.com</text>
</svg>
