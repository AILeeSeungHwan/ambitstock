<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7a0000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c62828;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b71c1c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffccbc;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Decorative element -->
  <circle cx="1050" cy="120" r="200" fill="#ffffff" opacity="0.04" />
  <circle cx="1050" cy="120" r="140" fill="#ffffff" opacity="0.04" />
  <!-- Top badge -->
  <rect x="60" y="60" width="280" height="44" rx="22" fill="#ffffff" opacity="0.2" />
  <text x="200" y="88" font-family="'Noto Sans KR', Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">해외반응 · 34개국 넷플릭스 TOP10</text>
  <!-- Main title -->
  <text x="60" y="195" font-family="'Noto Sans KR', Arial, sans-serif" font-size="80" font-weight="900" fill="#ffffff">샤이닝</text>
  <text x="60" y="285" font-family="'Noto Sans KR', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffccbc">Still Shining</text>
  <!-- Subtitle -->
  <text x="60" y="360" font-family="'Noto Sans KR', Arial, sans-serif" font-size="32" font-weight="400" fill="#ffe0e0">국내 시청률 2% · 글로벌 반응은 완전히 달랐다</text>
  <!-- Divider -->
  <rect x="60" y="398" width="140" height="4" fill="#ffffff" opacity="0.6" />
  <!-- Stats row -->
  <text x="60" y="455" font-family="'Noto Sans KR', Arial, sans-serif" font-size="26" fill="#ffccbc">마이드라마리스트 해외 반응 + 글로벌 차트 성과 총정리</text>
  <!-- Tags -->
  <rect x="60" y="506" width="130" height="38" rx="8" fill="#ffffff" opacity="0.18" />
  <text x="125" y="530" font-family="'Noto Sans KR', Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle" font-weight="700">해외반응후기</text>
  <rect x="210" y="506" width="110" height="38" rx="8" fill="#ffffff" opacity="0.18" />
  <text x="265" y="530" font-family="'Noto Sans KR', Arial, sans-serif" font-size="18" fill="#ffccbc" text-anchor="middle">K로맨스</text>
  <rect x="340" y="506" width="110" height="38" rx="8" fill="#ffffff" opacity="0.18" />
  <text x="395" y="530" font-family="'Noto Sans KR', Arial, sans-serif" font-size="18" fill="#ffccbc" text-anchor="middle">2026 봄</text>
  <!-- Site name -->
  <text x="1140" y="60" font-family="'Noto Sans KR', Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.5)" text-anchor="end">ambitstock.com</text>
</svg>
