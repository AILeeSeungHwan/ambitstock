<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Title -->
  <text x="600" y="90" font-family="'Noto Sans KR', Arial, sans-serif" font-size="34" font-weight="900" fill="#ffffff" text-anchor="middle">공포 강도별 넷플릭스 호러 영화 분류</text>
  <line x1="200" y1="110" x2="1000" y2="110" stroke="#1a73e8" stroke-width="2" opacity="0.6" />

  <!-- LOW section -->
  <rect x="60" y="130" width="330" height="340" rx="12" fill="#43a047" fill-opacity="0.15" stroke="#43a047" stroke-width="2" stroke-opacity="0.4" />
  <text x="225" y="168" font-family="'Noto Sans KR', Arial, sans-serif" font-size="22" font-weight="900" fill="#66bb6a" text-anchor="middle">강도 낮음</text>
  <text x="225" y="200" font-family="'Noto Sans KR', Arial, sans-serif" font-size="14" fill="#ffffff" fill-opacity="0.5" text-anchor="middle">분위기형 · 보고 잠잘 수 있음</text>
  <line x1="80" y1="215" x2="370" y2="215" stroke="#66bb6a" stroke-width="1" opacity="0.3" />
  <text x="225" y="255" font-family="'Noto Sans KR', Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff" text-anchor="middle">더 굿 너스</text>
  <text x="225" y="290" font-family="'Noto Sans KR', Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff" text-anchor="middle">아웃사이더</text>
  <text x="225" y="325" font-family="'Noto Sans KR', Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff" text-anchor="middle">스트레인저 띵스</text>
  <text x="225" y="410" font-family="'Noto Sans KR', Arial, sans-serif" font-size="15" fill="#66bb6a" fill-opacity="0.8" text-anchor="middle">불 끄고 자도 OK</text>

  <!-- MEDIUM section -->
  <rect x="435" y="130" width="330" height="340" rx="12" fill="#fb8c00" fill-opacity="0.12" stroke="#fb8c00" stroke-width="2" stroke-opacity="0.4" />
  <text x="600" y="168" font-family="'Noto Sans KR', Arial, sans-serif" font-size="22" font-weight="900" fill="#ffa726" text-anchor="middle">강도 중간</text>
  <text x="600" y="200" font-family="'Noto Sans KR', Arial, sans-serif" font-size="14" fill="#ffffff" fill-opacity="0.5" text-anchor="middle">점프 스케어 있음 · 잠들기 전 생각남</text>
  <line x1="455" y1="215" x2="745" y2="215" stroke="#ffa726" stroke-width="1" opacity="0.3" />
  <text x="600" y="255" font-family="'Noto Sans KR', Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff" text-anchor="middle">미드소마</text>
  <text x="600" y="290" font-family="'Noto Sans KR', Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff" text-anchor="middle">힐 하우스의 유령</text>
  <text x="600" y="325" font-family="'Noto Sans KR', Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff" text-anchor="middle">더 리추얼</text>
  <text x="600" y="410" font-family="'Noto Sans KR', Arial, sans-serif" font-size="15" fill="#ffa726" fill-opacity="0.8" text-anchor="middle">잠들기 전 한 번 생각남</text>

  <!-- HIGH section -->
  <rect x="810" y="130" width="330" height="340" rx="12" fill="#e53935" fill-opacity="0.12" stroke="#e53935" stroke-width="2" stroke-opacity="0.4" />
  <text x="975" y="168" font-family="'Noto Sans KR', Arial, sans-serif" font-size="22" font-weight="900" fill="#ef5350" text-anchor="middle">강도 높음</text>
  <text x="975" y="200" font-family="'Noto Sans KR', Arial, sans-serif" font-size="14" fill="#ffffff" fill-opacity="0.5" text-anchor="middle">다음날에도 생각남</text>
  <line x1="830" y1="215" x2="1120" y2="215" stroke="#ef5350" stroke-width="1" opacity="0.3" />
  <text x="975" y="255" font-family="'Noto Sans KR', Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff" text-anchor="middle">콰이어트 플레이스</text>
  <text x="975" y="290" font-family="'Noto Sans KR', Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff" text-anchor="middle">마마</text>
  <text x="975" y="325" font-family="'Noto Sans KR', Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff" text-anchor="middle">인시디어스</text>
  <text x="975" y="410" font-family="'Noto Sans KR', Arial, sans-serif" font-size="15" fill="#ef5350" fill-opacity="0.8" text-anchor="middle">심장 약하면 주의</text>

  <!-- Footer -->
  <text x="600" y="610" font-family="'Noto Sans KR', Arial, sans-serif" font-size="16" fill="#ffffff" fill-opacity="0.4" text-anchor="middle">R의 필름공장 | ambitstock.com</text>
</svg>
