<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a00;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#2d1a00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffec6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8860b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative gold pattern lines -->
  <line x1="0" y1="0" x2="1200" y2="630" stroke="#ffd700" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="0" y1="630" x2="1200" y2="0" stroke="#ffd700" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ffd700" stroke-width="0.3" stroke-opacity="0.06"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffd700" stroke-width="0.3" stroke-opacity="0.06"/>

  <!-- Glowing circles -->
  <circle cx="150" cy="100" r="200" fill="none" stroke="#ffd700" stroke-width="1" stroke-opacity="0.07"/>
  <circle cx="1050" cy="530" r="250" fill="none" stroke="#b8860b" stroke-width="1" stroke-opacity="0.07"/>
  <circle cx="600" cy="315" r="350" fill="none" stroke="#ffd700" stroke-width="0.5" stroke-opacity="0.04"/>

  <!-- Left accent bar -->
  <rect x="60" y="180" width="6" height="270" fill="url(#goldGrad)" rx="3"/>

  <!-- Badge: 영화 추천 -->
  <rect x="80" y="85" width="160" height="42" rx="21" fill="url(#badgeGrad)"/>
  <text x="160" y="113" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="20" font-weight="700" fill="#1a0a00" text-anchor="middle">영화 추천</text>

  <!-- 1300만 돌파 badge -->
  <rect x="264" y="85" width="220" height="42" rx="21" fill="none" stroke="#ffd700" stroke-width="2"/>
  <text x="374" y="113" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="20" font-weight="700" fill="#ffd700" text-anchor="middle">🏆 1300만 돌파</text>

  <!-- Main title: 왕과 사는 남자 -->
  <text x="80" y="240" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="86" font-weight="900" fill="url(#goldGrad)" filter="url(#textShadow)">왕과 사는</text>
  <text x="80" y="340" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="86" font-weight="900" fill="url(#goldGrad)" filter="url(#textShadow)">남자</text>

  <!-- Subtitle -->
  <text x="80" y="410" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="400" fill="#ffffff" opacity="0.92" filter="url(#textShadow)">2026 한국 영화 최대 흥행작</text>

  <!-- Bottom info row -->
  <rect x="80" y="450" width="800" height="2" fill="url(#goldGrad)" opacity="0.5"/>

  <text x="80" y="490" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="24" fill="#cccccc" opacity="0.9">유해진 · 박지훈 · 유지태 주연</text>
  <text x="80" y="525" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="22" fill="#aaaaaa" opacity="0.8">2026.02.04 개봉 · 사극 코미디 · 1450년대 조선</text>

  <!-- Right side: big number decoration -->
  <text x="1050" y="400" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="160" font-weight="900" fill="#ffd700" opacity="0.07" text-anchor="middle">1300</text>
  <text x="1050" y="480" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="48" font-weight="700" fill="#ffd700" opacity="0.12" text-anchor="middle">만 관객</text>

  <!-- Star decorations -->
  <text x="960" y="160" font-size="28" fill="#ffd700" opacity="0.5">★</text>
  <text x="1020" y="200" font-size="18" fill="#ffd700" opacity="0.35">★</text>
  <text x="1080" y="150" font-size="22" fill="#ffd700" opacity="0.4">★</text>
  <text x="1130" y="190" font-size="32" fill="#ffd700" opacity="0.45">★</text>
  <text x="1000" y="250" font-size="14" fill="#ffd700" opacity="0.3">★</text>

  <!-- Bottom right domain -->
  <text x="1140" y="615" font-family="'Arial', sans-serif" font-size="18" fill="#888888" text-anchor="end" opacity="0.7">ambitstock.com</text>
</svg>
