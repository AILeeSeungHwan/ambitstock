<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0000"/>
      <stop offset="50%" style="stop-color:#3d0000"/>
      <stop offset="100%" style="stop-color:#4a0000"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e50914"/>
      <stop offset="100%" style="stop-color:#ff1744"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ffec6e"/>
    </linearGradient>
    <radialGradient id="center" cx="70%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#e50914;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#e50914;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#center)"/>
  <!-- Right panel for ranking numbers -->
  <rect x="860" y="0" width="340" height="630" fill="#000000" opacity="0.25"/>
  <!-- Ranking number decoration right side -->
  <text x="1045" y="155" font-family="Arial Black, Arial, sans-serif" font-size="110" font-weight="900" fill="#e50914" opacity="0.12" text-anchor="middle">1</text>
  <text x="1045" y="270" font-family="Arial Black, Arial, sans-serif" font-size="110" font-weight="900" fill="#e50914" opacity="0.09" text-anchor="middle">2</text>
  <text x="1045" y="385" font-family="Arial Black, Arial, sans-serif" font-size="110" font-weight="900" fill="#e50914" opacity="0.07" text-anchor="middle">3</text>
  <text x="1045" y="500" font-family="Arial Black, Arial, sans-serif" font-size="110" font-weight="900" fill="#e50914" opacity="0.05" text-anchor="middle">4</text>
  <!-- Horizontal rank bars right side -->
  <rect x="880" y="105" width="300" height="4" fill="#e50914" opacity="0.2" rx="2"/>
  <rect x="880" y="220" width="260" height="4" fill="#e50914" opacity="0.15" rx="2"/>
  <rect x="880" y="335" width="220" height="4" fill="#e50914" opacity="0.12" rx="2"/>
  <rect x="880" y="450" width="180" height="4" fill="#e50914" opacity="0.1" rx="2"/>
  <!-- Trophy icon top-right -->
  <polygon points="970,40 1000,40 1000,70 985,85 970,70" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.3"/>
  <rect x="975" y="85" width="20" height="6" rx="2" fill="#ffd700" opacity="0.3"/>
  <rect x="968" y="91" width="34" height="5" rx="2" fill="#ffd700" opacity="0.25"/>
  <!-- Crown symbol watermark -->
  <text x="1040" y="580" font-family="Arial, sans-serif" font-size="90" fill="#e50914" opacity="0.06" text-anchor="middle">TOP</text>
  <!-- Left accent bar -->
  <rect x="80" y="165" width="7" height="300" fill="url(#acc)" rx="3.5"/>
  <!-- Category badge -->
  <rect x="106" y="165" width="100" height="38" rx="19" fill="#e50914" opacity="0.95"/>
  <text x="156" y="189" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="white" text-anchor="middle">드라마</text>
  <!-- Netflix badge -->
  <rect x="220" y="165" width="128" height="38" rx="19" fill="#ffffff" opacity="0.1"/>
  <text x="284" y="189" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#ffcccc" text-anchor="middle">넷플릭스</text>
  <!-- Main title line 1 -->
  <text x="106" y="300" font-family="Arial Black, Arial, sans-serif" font-size="78" font-weight="900" fill="white" letter-spacing="-2">넷플릭스 K드라마</text>
  <!-- Main title line 2 with gold -->
  <text x="106" y="388" font-family="Arial Black, Arial, sans-serif" font-size="80" font-weight="900" fill="url(#gold)" letter-spacing="-2">역대 TOP 10</text>
  <!-- Subtitle -->
  <text x="106" y="443" font-family="Arial, sans-serif" font-size="26" font-weight="400" fill="#ffcccc" opacity="0.88">시청률 기준 · 역대 순위 · 추천 가이드</text>
  <!-- Divider -->
  <rect x="106" y="466" width="310" height="3" fill="url(#acc)" rx="1.5" opacity="0.55"/>
  <!-- Bottom bar -->
  <rect x="0" y="572" width="1200" height="58" fill="#e50914" opacity="0.12"/>
  <text x="600" y="609" font-family="Arial, sans-serif" font-size="19" fill="#ffcccc" text-anchor="middle" opacity="0.88">ambitstock.com | R의 필름공장</text>
</svg>
