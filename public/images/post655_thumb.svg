<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c0392b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Decorative lines -->
  <line x1="0" y1="180" x2="1200" y2="180" stroke="#8B0000" stroke-width="1" opacity="0.4"/>
  <line x1="0" y1="450" x2="1200" y2="450" stroke="#8B0000" stroke-width="1" opacity="0.4"/>
  <!-- Left accent bar -->
  <rect x="80" y="140" width="6" height="350" fill="url(#accent)" rx="3"/>
  <!-- Category badge -->
  <rect x="80" y="100" width="160" height="34" fill="#c0392b" rx="17"/>
  <text x="160" y="123" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="15" fill="white" text-anchor="middle" font-weight="600">해외반응</text>
  <!-- Main title -->
  <text x="110" y="220" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="64" fill="white" font-weight="800">시너스</text>
  <text x="110" y="295" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="36" fill="#ff9999" font-weight="700">Sinners (2025)</text>
  <!-- Divider -->
  <rect x="110" y="320" width="500" height="3" fill="url(#accent)" rx="1.5"/>
  <!-- Subtitle line 1 -->
  <text x="110" y="375" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="30" fill="white" font-weight="600">로튼토마토 97% · 오스카 4관왕</text>
  <!-- Subtitle line 2 -->
  <text x="110" y="420" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="26" fill="#cccccc" font-weight="400">마이클 B. 조던 × 라이언 쿠글러</text>
  <!-- Score badges -->
  <rect x="110" y="468" width="130" height="40" fill="rgba(192,57,43,0.7)" rx="6" stroke="#ff4444" stroke-width="1"/>
  <text x="175" y="494" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="700">RT 97%</text>
  <rect x="255" y="468" width="150" height="40" fill="rgba(192,57,43,0.5)" rx="6" stroke="#ff4444" stroke-width="1"/>
  <text x="330" y="494" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="700">IMDB 7.5</text>
  <rect x="420" y="468" width="170" height="40" fill="rgba(192,57,43,0.5)" rx="6" stroke="#ff4444" stroke-width="1"/>
  <text x="505" y="494" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="700">오스카 16후보</text>
  <!-- Site URL -->
  <text x="1120" y="600" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="18" fill="rgba(255,255,255,0.5)" text-anchor="end">ambitstock.com</text>
</svg>
