<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b0000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3d0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e50914;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b0000;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Texture lines -->
  <line x1="0" y1="0" x2="1200" y2="630" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.05" />
  <line x1="0" y1="210" x2="1200" y2="630" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.05" />
  <line x1="400" y1="0" x2="1200" y2="630" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04" />

  <!-- Left accent bar -->
  <rect x="80" y="180" width="6" height="270" fill="url(#accent)" rx="3" />

  <!-- Category badge -->
  <rect x="80" y="120" width="160" height="40" fill="#e50914" rx="4" />
  <text x="160" y="147" font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">영화추천</text>

  <!-- Main title -->
  <text x="110" y="245" font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif" font-size="72" font-weight="900" fill="#ffffff" letter-spacing="-2">다이 마이 러브</text>

  <!-- Subtitle -->
  <text x="110" y="310" font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif" font-size="32" font-weight="400" fill="#ffcccc" letter-spacing="1">Die My Love</text>

  <!-- Actor names -->
  <text x="110" y="380" font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif" font-size="28" font-weight="700" fill="#ff6b6b">제니퍼 로렌스 × 로버트 패틴슨</text>

  <!-- Divider -->
  <rect x="110" y="405" width="500" height="2" fill="#e50914" opacity="0.6" />

  <!-- Director info -->
  <text x="110" y="440" font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif" font-size="22" font-weight="400" fill="#cccccc">린 램지 감독 | 118분 | 청소년 관람불가</text>

  <!-- Cannes badge -->
  <rect x="110" y="470" width="320" height="48" fill="none" stroke="#d4af37" stroke-width="2" rx="4" />
  <text x="270" y="501" font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif" font-size="20" font-weight="700" fill="#d4af37" text-anchor="middle">칸 영화제 6분 기립박수</text>

  <!-- Release date -->
  <text x="110" y="555" font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif" font-size="20" font-weight="400" fill="#999999">2026년 3월 4일 개봉 | ambitstock.com</text>

  <!-- Right side decorative element -->
  <circle cx="950" cy="315" r="220" fill="none" stroke="#8b0000" stroke-width="1.5" stroke-opacity="0.4" />
  <circle cx="950" cy="315" r="170" fill="none" stroke="#e50914" stroke-width="1" stroke-opacity="0.2" />
  <circle cx="950" cy="315" r="120" fill="#1a0000" fill-opacity="0.5" stroke="#c0392b" stroke-width="1" stroke-opacity="0.3" />

  <!-- Heart symbol -->
  <text x="950" y="290" font-family="serif" font-size="80" fill="#e50914" text-anchor="middle" opacity="0.7">♥</text>
  <text x="950" y="360" font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="0.8">DIE</text>
  <text x="950" y="390" font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif" font-size="18" font-weight="400" fill="#cccccc" text-anchor="middle" opacity="0.7">MY LOVE</text>
</svg>
