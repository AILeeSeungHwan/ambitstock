<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="webGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e50914;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#e50914;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#e50914;stop-opacity:0" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3" />
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="redglow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Spider-web pattern lines (top-left corner) -->
  <g opacity="0.12" stroke="#e50914" stroke-width="1">
    <!-- Radial lines from top-left -->
    <line x1="0" y1="0" x2="400" y2="630" />
    <line x1="0" y1="0" x2="600" y2="630" />
    <line x1="0" y1="0" x2="800" y2="630" />
    <line x1="0" y1="0" x2="250" y2="630" />
    <line x1="0" y1="0" x2="1200" y2="400" />
    <line x1="0" y1="0" x2="1200" y2="200" />
    <!-- Concentric arc approximations -->
    <ellipse cx="0" cy="0" rx="200" ry="200" fill="none" />
    <ellipse cx="0" cy="0" rx="350" ry="350" fill="none" />
    <ellipse cx="0" cy="0" rx="500" ry="500" fill="none" />
    <ellipse cx="0" cy="0" rx="650" ry="650" fill="none" />
    <ellipse cx="0" cy="0" rx="800" ry="800" fill="none" />
    <ellipse cx="0" cy="0" rx="950" ry="950" fill="none" />
  </g>

  <!-- Red atmospheric glow (bottom-right) -->
  <ellipse cx="1050" cy="400" rx="350" ry="280" fill="#e50914" opacity="0.07" filter="url(#blur)" />
  <ellipse cx="600" cy="580" rx="700" ry="100" fill="#e50914" opacity="0.06" filter="url(#blur)" />

  <!-- Horizontal red glow band -->
  <rect x="0" y="260" width="1200" height="90" fill="url(#webGlow)" />

  <!-- Top accent line (red) -->
  <rect x="0" y="0" width="1200" height="4" fill="#e50914" opacity="0.9" />

  <!-- Marvel badge -->
  <rect x="60" y="50" width="100" height="36" rx="4" fill="#e50914" opacity="0.95" />
  <text x="110" y="73" font-family="'Arial Black', 'Noto Sans KR', sans-serif" font-size="17" font-weight="900" fill="#ffffff" text-anchor="middle">MARVEL</text>

  <!-- MCU badge -->
  <rect x="174" y="50" width="130" height="36" rx="18" fill="none" stroke="#e50914" stroke-width="1.5" opacity="0.8" />
  <text x="239" y="73" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="600" fill="#e50914" text-anchor="middle">MCU 페이즈 6</text>

  <!-- Year badge -->
  <rect x="318" y="50" width="80" height="36" rx="18" fill="none" stroke="#aaaaaa" stroke-width="1" opacity="0.5" />
  <text x="358" y="73" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="600" fill="#aaaaaa" text-anchor="middle">2026</text>

  <!-- Sub label -->
  <text x="60" y="155" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="20" font-weight="500" fill="#e57373" opacity="0.9" text-anchor="start">톰 홀랜드 주연 · 2026년 7월 31일 개봉</text>

  <!-- Main title line 1 -->
  <text x="60" y="270" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Arial Black', sans-serif" font-size="100" font-weight="900" fill="#ffffff" opacity="0.97" text-anchor="start" filter="url(#textglow)">스파이더맨4</text>

  <!-- Main title line 2 — red accent -->
  <text x="60" y="365" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="52" font-weight="800" fill="#e50914" opacity="0.95" text-anchor="start" filter="url(#redglow)">브랜드 뉴 데이</text>

  <!-- Divider -->
  <rect x="60" y="390" width="380" height="2" fill="#e50914" opacity="0.5" />

  <!-- Subtitle -->
  <text x="60" y="430" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="700" fill="#ffffff" opacity="0.88" text-anchor="start">노 웨이 홈 이후 — 모두가 피터 파커를 잊었다</text>

  <!-- Sub info -->
  <text x="60" y="468" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="19" font-weight="400" fill="#bbbbbb" opacity="0.78" text-anchor="start">어벤져스 둠스데이 연결고리 · MCU 솔로 4번째</text>

  <!-- Right side: Spider badge circle -->
  <circle cx="1000" cy="300" r="120" fill="#e50914" opacity="0.06" />
  <circle cx="1000" cy="300" r="100" fill="none" stroke="#e50914" stroke-width="1.5" opacity="0.25" />
  <circle cx="1000" cy="300" r="75" fill="none" stroke="#e50914" stroke-width="1" opacity="0.18" />
  <!-- Spider-man spider symbol (simplified) -->
  <text x="1000" y="255" font-family="'Arial Black', sans-serif" font-size="22" font-weight="900" fill="#e50914" text-anchor="middle" opacity="0.6">SPIDER</text>
  <text x="1000" y="320" font-family="'Arial Black', sans-serif" font-size="72" font-weight="900" fill="#e50914" text-anchor="middle" opacity="0.55">★</text>
  <text x="1000" y="365" font-family="'Arial Black', sans-serif" font-size="22" font-weight="900" fill="#e50914" text-anchor="middle" opacity="0.6">MAN</text>

  <!-- Web lines from top-right -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="0.8">
    <line x1="1200" y1="0" x2="700" y2="630" />
    <line x1="1200" y1="0" x2="900" y2="630" />
    <line x1="1200" y1="0" x2="1100" y2="630" />
    <line x1="1200" y1="0" x2="500" y2="630" />
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="568" width="1200" height="62" fill="#000000" opacity="0.65" />
  <text x="60" y="605" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="400" fill="#e57373" opacity="0.75" text-anchor="start">ambitstock.com — R의 필름공장</text>
  <text x="1140" y="605" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="400" fill="#e57373" opacity="0.75" text-anchor="end">마블 · MCU · 페이즈6</text>

  <!-- Bottom accent -->
  <rect x="0" y="626" width="1200" height="4" fill="#e50914" opacity="0.6" />
</svg>
