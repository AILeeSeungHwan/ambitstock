<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Main elegant rose/gold gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0a;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#3d0b1c;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#6b1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c1010;stop-opacity:1" />
    </linearGradient>
    <!-- Gold accent gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8963c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0c96e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8963c;stop-opacity:1" />
    </linearGradient>
    <!-- Rose accent -->
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e53935;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#e53935;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#e53935;stop-opacity:0" />
    </linearGradient>
    <!-- Badge gradient -->
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8963c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a07030;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Decorative rose tint overlay center -->
  <ellipse cx="600" cy="315" rx="500" ry="250" fill="url(#roseGrad)" />

  <!-- Ornamental top border line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#goldGrad)" />

  <!-- Ornamental bottom border line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#goldGrad)" />

  <!-- Left decorative floral element -->
  <g opacity="0.25" transform="translate(60,315)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#c8963c" stroke-width="1" />
    <circle cx="0" cy="0" r="55" fill="none" stroke="#c8963c" stroke-width="0.8" />
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#c8963c" stroke-width="0.5" />
    <line x1="0" y1="-80" x2="0" y2="80" stroke="#c8963c" stroke-width="0.5" />
    <line x1="-57" y1="-57" x2="57" y2="57" stroke="#c8963c" stroke-width="0.5" />
    <line x1="57" y1="-57" x2="-57" y2="57" stroke="#c8963c" stroke-width="0.5" />
  </g>

  <!-- Right decorative floral element -->
  <g opacity="0.25" transform="translate(1140,315)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#c8963c" stroke-width="1" />
    <circle cx="0" cy="0" r="55" fill="none" stroke="#c8963c" stroke-width="0.8" />
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#c8963c" stroke-width="0.5" />
    <line x1="0" y1="-80" x2="0" y2="80" stroke="#c8963c" stroke-width="0.5" />
    <line x1="-57" y1="-57" x2="57" y2="57" stroke="#c8963c" stroke-width="0.5" />
    <line x1="57" y1="-57" x2="-57" y2="57" stroke="#c8963c" stroke-width="0.5" />
  </g>

  <!-- Top ornamental divider -->
  <line x1="200" y1="110" x2="1000" y2="110" stroke="url(#goldGrad)" stroke-width="1" opacity="0.6" />
  <circle cx="600" cy="110" r="4" fill="#f0c96e" opacity="0.8" />
  <circle cx="200" cy="110" r="3" fill="#f0c96e" opacity="0.5" />
  <circle cx="1000" cy="110" r="3" fill="#f0c96e" opacity="0.5" />

  <!-- BADGE: 해외반응 -->
  <rect x="490" y="68" width="220" height="36" rx="18" fill="url(#badgeGrad)" />
  <text x="600" y="92" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="700" fill="#1a0a0a" text-anchor="middle" letter-spacing="3">해외반응 후기</text>

  <!-- Main title: 브리저튼 시즌4 -->
  <text x="600" y="230" font-family="'Noto Serif KR', 'Apple SD Gothic Neo', Georgia, serif" font-size="76" font-weight="900" fill="#ffffff" text-anchor="middle" filter="url(#softGlow)" letter-spacing="-1">브리저튼 시즌4</text>

  <!-- Gold accent underline for main title -->
  <rect x="310" y="248" width="580" height="3" rx="2" fill="url(#goldGrad)" opacity="0.9" />

  <!-- Sub title: 하예린 해외 반응 -->
  <text x="600" y="330" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="50" font-weight="700" fill="#f0c96e" text-anchor="middle" filter="url(#glow)" letter-spacing="1">하예린 해외 반응 총정리</text>

  <!-- Bottom ornamental divider -->
  <line x1="200" y1="390" x2="1000" y2="390" stroke="url(#goldGrad)" stroke-width="1" opacity="0.6" />
  <circle cx="600" cy="390" r="4" fill="#f0c96e" opacity="0.8" />
  <circle cx="200" cy="390" r="3" fill="#f0c96e" opacity="0.5" />
  <circle cx="1000" cy="390" r="3" fill="#f0c96e" opacity="0.5" />

  <!-- Bottom info line -->
  <text x="600" y="450" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="400" fill="#e8c47a" text-anchor="middle" opacity="0.9" letter-spacing="2">한국 배우 넷플릭스 글로벌 주연</text>

  <!-- Stats line -->
  <text x="600" y="500" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="20" font-weight="400" fill="#c8963c" text-anchor="middle" opacity="0.8" letter-spacing="1">90개국 1위 · 주간 2,300만 뷰 · 2026</text>

  <!-- Site watermark -->
  <text x="600" y="576" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="400" fill="#c8963c" text-anchor="middle" opacity="0.5" letter-spacing="2">ambitstock.com</text>

  <!-- Bottom ornament -->
  <rect x="0" y="600" width="1200" height="30" fill="#000000" opacity="0.3" />
</svg>
