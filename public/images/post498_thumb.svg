<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d0057;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6a1b9a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a148c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ce93d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3e5f5;stop-opacity:1" />
    </linearGradient>
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative lines -->
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#9c27b0" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="0" y1="530" x2="1200" y2="530" stroke="#9c27b0" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Left accent bar -->
  <rect x="60" y="120" width="6" height="390" fill="url(#accentGrad)" rx="3"/>

  <!-- Disney+ badge (top right) -->
  <rect x="960" y="40" width="200" height="50" rx="8" fill="#1e3a5f"/>
  <text x="1060" y="71" font-family="'Arial Black', Arial, sans-serif" font-size="20" font-weight="900" fill="#ffffff" text-anchor="middle">Disney+</text>

  <!-- ENA badge -->
  <rect x="1050" y="105" width="110" height="40" rx="6" fill="#00897b"/>
  <text x="1105" y="131" font-family="'Arial Black', Arial, sans-serif" font-size="18" font-weight="900" fill="#ffffff" text-anchor="middle">ENA</text>

  <!-- Category label -->
  <rect x="80" y="130" width="120" height="34" rx="4" fill="#9c27b0"/>
  <text x="140" y="153" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">드라마 추천</text>

  <!-- Main Title -->
  <text x="90" y="260" font-family="'Arial Black', 'Malgun Gothic', Arial, sans-serif" font-size="108" font-weight="900" fill="#ffffff" filter="url(#textShadow)">클라이맥스</text>

  <!-- Subtitle / cast -->
  <text x="90" y="330" font-family="'Malgun Gothic', Arial, sans-serif" font-size="42" font-weight="700" fill="url(#accentGrad)" filter="url(#textShadow)">주지훈 × 하지원</text>

  <!-- Description line -->
  <text x="90" y="395" font-family="'Malgun Gothic', Arial, sans-serif" font-size="28" font-weight="400" fill="#e1bee7">거대한 권력에 맞선 열혈 검사의 생존기</text>

  <!-- Cast details -->
  <text x="90" y="450" font-family="'Malgun Gothic', Arial, sans-serif" font-size="22" font-weight="400" fill="#ce93d8">출연 오정세 · 나나 · 차주영</text>

  <!-- Bottom info bar -->
  <rect x="0" y="555" width="1200" height="75" fill="#000000" fill-opacity="0.4"/>
  <text x="90" y="600" font-family="'Malgun Gothic', Arial, sans-serif" font-size="22" fill="#ffffff" font-weight="400">2026년 3월 16일 공개</text>
  <text x="460" y="600" font-family="'Malgun Gothic', Arial, sans-serif" font-size="22" fill="#ce93d8" font-weight="700">디즈니플러스 + ENA 동시 방영</text>
  <text x="950" y="600" font-family="'Malgun Gothic', Arial, sans-serif" font-size="20" fill="#9e9e9e">ambitstock.com</text>
</svg>
