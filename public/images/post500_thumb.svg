<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#0d2b0d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a4a1a;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#2d7a2d;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1a4a1a;stop-opacity:0" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3" />
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Atmospheric fog/mist layers -->
  <ellipse cx="200" cy="500" rx="400" ry="150" fill="#1a5a1a" opacity="0.08" filter="url(#blur)" />
  <ellipse cx="900" cy="450" rx="350" ry="120" fill="#0d3d0d" opacity="0.12" filter="url(#blur)" />
  <ellipse cx="600" cy="580" rx="600" ry="100" fill="#1a4a1a" opacity="0.15" filter="url(#blur)" />

  <!-- Horizontal glow band -->
  <rect x="0" y="280" width="1200" height="80" fill="url(#glow)" />

  <!-- Decorative vertical lines (eerie atmosphere) -->
  <line x1="80" y1="0" x2="80" y2="630" stroke="#2a5a2a" stroke-width="0.5" opacity="0.3" />
  <line x1="1120" y1="0" x2="1120" y2="630" stroke="#2a5a2a" stroke-width="0.5" opacity="0.3" />

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="#d4a017" opacity="0.8" />

  <!-- Badge -->
  <rect x="60" y="50" width="130" height="36" rx="18" fill="#d4a017" opacity="0.92" />
  <text x="125" y="73" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="700" fill="#0a1a0a" text-anchor="middle">영화 추천</text>

  <!-- Year badge -->
  <rect x="210" y="50" width="90" height="36" rx="18" fill="none" stroke="#d4a017" stroke-width="1.5" opacity="0.7" />
  <text x="255" y="73" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="600" fill="#d4a017" text-anchor="middle">2026</text>

  <!-- Director tag -->
  <text x="60" y="155" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="20" font-weight="500" fill="#7abf7a" opacity="0.9" text-anchor="start">나홍진 감독</text>

  <!-- Main title: 호프 (HOPE) — large, prominent -->
  <text x="60" y="270" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="128" font-weight="900" fill="#e8f5e8" opacity="0.95" text-anchor="start" filter="url(#textglow)">호프</text>

  <!-- English title -->
  <text x="72" y="330" font-family="'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="300" fill="#7abf7a" opacity="0.8" text-anchor="start" letter-spacing="12">HOPE</text>

  <!-- Divider -->
  <rect x="60" y="360" width="320" height="2" fill="#d4a017" opacity="0.6" />

  <!-- Subtitle line 1 -->
  <text x="60" y="400" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="26" font-weight="700" fill="#ffffff" opacity="0.9" text-anchor="start">곡성 이후 10년 — 한국 SF 스릴러의 귀환</text>

  <!-- Subtitle line 2 -->
  <text x="60" y="440" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="22" font-weight="400" fill="#b0b0b0" opacity="0.85" text-anchor="start">1970-80년대 비무장지대 · 외계 생명체 · 기대작 1위</text>

  <!-- Right side: number 1 badge -->
  <circle cx="980" cy="315" r="110" fill="#d4a017" opacity="0.12" />
  <circle cx="980" cy="315" r="90" fill="none" stroke="#d4a017" stroke-width="2" opacity="0.4" />
  <text x="980" y="295" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#d4a017" text-anchor="middle" opacity="0.9">기자단</text>
  <text x="980" y="360" font-family="'Helvetica Neue', Arial, sans-serif" font-size="80" font-weight="900" fill="#d4a017" text-anchor="middle" opacity="0.9">#1</text>
  <text x="980" y="400" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="18" font-weight="600" fill="#d4a017" text-anchor="middle" opacity="0.8">기대작</text>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#000000" opacity="0.6" />
  <text x="60" y="605" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="400" fill="#7abf7a" opacity="0.7" text-anchor="start">ambitstock.com — R의 필름공장</text>
  <text x="1140" y="605" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="400" fill="#7abf7a" opacity="0.7" text-anchor="end">추격자 · 황해 · 곡성</text>

  <!-- Bottom accent -->
  <rect x="0" y="626" width="1200" height="4" fill="#d4a017" opacity="0.5" />
</svg>
