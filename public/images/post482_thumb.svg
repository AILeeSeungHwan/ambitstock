  <circle cx="860" cy="108" r="1.5" fill="#ab47bc" fill-opacity="0.5"/>
  <line x1="860" y1="100" x2="860" y2="116" stroke="#ce93d8" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="852" y1="108" x2="868" y2="108" stroke="#ce93d8" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="1140" cy="160" r="2.5" fill="#ce93d8" fill-opacity="0.45"/>
  <line x1="1140" y1="152" x2="1140" y2="168" stroke="#ce93d8" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="1132" y1="160" x2="1148" y2="160" stroke="#ce93d8" stroke-width="1" stroke-opacity="0.4"/>
