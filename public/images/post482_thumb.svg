  <line x1="110" y1="500" x2="750" y2="500" stroke="#ab47bc" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="110" y1="506" x2="500" y2="506" stroke="#ab47bc" stroke-width="0.5" stroke-opacity="0.15"/>
