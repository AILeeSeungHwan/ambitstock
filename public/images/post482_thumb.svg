      <stop offset="0%" stop-color="#1a0030"/>
      <stop offset="100%" stop-color="#3d0066"/>
    </linearGradient>
    <linearGradient id="accent482" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6a1b9a"/>
      <stop offset="100%" stop-color="#ab47bc"/>
