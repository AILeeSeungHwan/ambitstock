<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e50914;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7f0000;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1.2" fill="rgba(255,255,255,0.07)" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#dots)" />

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="#ff5252" />

  <!-- Decorative elements -->
  <circle cx="1100" cy="80" r="220" fill="rgba(255,82,82,0.1)" />
  <circle cx="1100" cy="80" r="150" fill="rgba(255,82,82,0.08)" />
  <circle cx="80" cy="560" r="150" fill="rgba(0,0,0,0.15)" />

  <!-- Category label -->
  <rect x="60" y="60" width="120" height="36" rx="18" fill="rgba(255,255,255,0.2)" />
  <text x="120" y="84" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">드라마</text>

  <!-- Netflix badge -->
  <rect x="1040" y="60" width="110" height="36" rx="18" fill="rgba(0,0,0,0.35)" />
  <text x="1095" y="84" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">NETFLIX</text>

  <!-- Main title -->
  <text x="600" y="265" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="100" font-weight="900" fill="white" text-anchor="middle" letter-spacing="4">원더풀스</text>

  <!-- Accent underline -->
  <rect x="360" y="295" width="480" height="5" rx="2.5" fill="#ffe082" />

  <!-- Subtitle line 1 -->
  <text x="600" y="375" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="600" fill="#ffe082" text-anchor="middle">박은빈 · 차은우</text>

  <!-- Subtitle line 2 -->
  <text x="600" y="418" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="26" font-weight="400" fill="rgba(255,255,255,0.9)" text-anchor="middle">5월 넷플릭스 공개 예정</text>

  <!-- Divider line -->
  <line x1="460" y1="455" x2="740" y2="455" stroke="rgba(255,255,255,0.2)" stroke-width="1" />

  <!-- Tags -->
  <text x="600" y="502" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="21" font-weight="400" fill="rgba(255,255,255,0.65)" text-anchor="middle">#원더풀스 #박은빈 #차은우 #5월넷플릭스</text>

  <!-- Source -->
  <text x="600" y="590" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.4)" text-anchor="middle">ambitstock.com</text>
</svg>
