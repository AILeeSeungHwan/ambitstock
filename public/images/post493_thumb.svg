<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#0d47a1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e50914;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e50914;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Decorative circles -->
  <circle cx="980" cy="120" r="200" fill="rgba(255,255,255,0.04)" />
  <circle cx="1100" cy="500" r="160" fill="rgba(229,9,20,0.12)" />
  <circle cx="80" cy="520" r="120" fill="rgba(255,255,255,0.04)" />
  <!-- Top badge -->
  <rect x="80" y="80" width="200" height="44" rx="22" fill="url(#badge)" />
  <text x="180" y="108" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">영화추천</text>
  <!-- Year tag -->
  <rect x="298" y="80" width="130" height="44" rx="22" fill="rgba(255,255,255,0.15)" />
  <text x="363" y="108" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">2026</text>
  <!-- Main title line 1 -->
  <text x="80" y="230" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="90" font-weight="900" fill="white" letter-spacing="-2">2026 상반기</text>
  <!-- Main title line 2 -->
  <text x="80" y="340" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="72" font-weight="900" fill="#FFD600" letter-spacing="-1">극장 기대작 총정리</text>
  <!-- Divider line -->
  <rect x="80" y="374" width="500" height="4" rx="2" fill="rgba(255,255,255,0.35)" />
  <!-- Subtitle -->
  <text x="80" y="430" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="36" font-weight="500" fill="rgba(255,255,255,0.90)">놓치면 후회할 영화 10편 — 3월~6월</text>
  <!-- Bottom info row -->
  <rect x="80" y="510" width="420" height="50" rx="8" fill="rgba(0,0,0,0.30)" />
  <text x="100" y="542" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="22" fill="rgba(255,255,255,0.85)">SF · 픽사 · 스타워즈 · 블록버스터</text>
  <!-- Site label -->
  <text x="1120" y="600" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="20" fill="rgba(255,255,255,0.45)" text-anchor="end">ambitstock.com</text>
</svg>
