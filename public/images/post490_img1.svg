<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1b2838;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ts1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ts2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00695c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004d40;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ts3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e65100;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bf360c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ts4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6a1b9a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a148c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ts5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Top accent -->
  <rect x="0" y="0" width="1200" height="5" fill="#FFD700" />
  <!-- Header -->
  <text x="600" y="55" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="28" font-weight="700" fill="#FFD700" text-anchor="middle">토이스토리 시리즈 타임라인 1995–2026</text>
  <!-- Timeline line -->
  <rect x="80" y="90" width="1040" height="4" rx="2" fill="#FFD700" opacity="0.4"/>

  <!-- TS1 card -->
  <circle cx="180" cy="92" r="12" fill="#FFD700"/>
  <rect x="60" y="115" width="210" height="390" rx="12" fill="url(#ts1)"/>
  <text x="165" y="158" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900" fill="#ffffff" text-anchor="middle">1</text>
  <text x="165" y="192" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#90caf9" text-anchor="middle">1995년</text>
  <rect x="80" y="205" width="170" height="2" fill="#ffffff" opacity="0.3"/>
  <text x="165" y="238" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">토이스토리</text>
  <text x="165" y="272" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#bbdefb" text-anchor="middle">우디 vs 버즈</text>
  <text x="165" y="292" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#bbdefb" text-anchor="middle">질투와 우정의 탄생</text>
  <text x="165" y="340" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#FFD700" text-anchor="middle">핵심 테마</text>
  <text x="165" y="362" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">장난감의 존재 의미</text>
  <text x="165" y="380" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">아이에게 사랑받기</text>

  <!-- TS2 card -->
  <circle cx="390" cy="92" r="12" fill="#FFD700"/>
  <rect x="270" y="115" width="210" height="390" rx="12" fill="url(#ts2)"/>
  <text x="375" y="158" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900" fill="#ffffff" text-anchor="middle">2</text>
  <text x="375" y="192" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#80cbc4" text-anchor="middle">1999년</text>
  <rect x="290" y="205" width="170" height="2" fill="#ffffff" opacity="0.3"/>
  <text x="375" y="238" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">토이스토리 2</text>
  <text x="375" y="272" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#b2dfdb" text-anchor="middle">우디의 과거와 정체성</text>
  <text x="375" y="292" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#b2dfdb" text-anchor="middle">박물관 vs 앤디</text>
  <text x="375" y="340" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#FFD700" text-anchor="middle">핵심 테마</text>
  <text x="375" y="362" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">영원히 사랑받을 것인가</text>
  <text x="375" y="380" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">vs 현재를 선택할 것인가</text>

  <!-- TS3 card -->
  <circle cx="600" cy="92" r="12" fill="#FFD700"/>
  <rect x="480" y="115" width="210" height="390" rx="12" fill="url(#ts3)"/>
  <text x="585" y="158" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900" fill="#ffffff" text-anchor="middle">3</text>
  <text x="585" y="192" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ffcc80" text-anchor="middle">2010년</text>
  <rect x="500" y="205" width="170" height="2" fill="#ffffff" opacity="0.3"/>
  <text x="585" y="238" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">토이스토리 3</text>
  <text x="585" y="272" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#ffe0b2" text-anchor="middle">앤디의 성장, 보육원</text>
  <text x="585" y="292" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#ffe0b2" text-anchor="middle">영화역사의 명장면들</text>
  <text x="585" y="340" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#FFD700" text-anchor="middle">핵심 테마</text>
  <text x="585" y="362" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">이별과 놓아주기</text>
  <text x="585" y="380" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">성장의 의미</text>

  <!-- TS4 card -->
  <circle cx="810" cy="92" r="12" fill="#FFD700"/>
  <rect x="690" y="115" width="210" height="390" rx="12" fill="url(#ts4)"/>
  <text x="795" y="158" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900" fill="#ffffff" text-anchor="middle">4</text>
  <text x="795" y="192" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ce93d8" text-anchor="middle">2019년</text>
  <rect x="710" y="205" width="170" height="2" fill="#ffffff" opacity="0.3"/>
  <text x="795" y="238" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">토이스토리 4</text>
  <text x="795" y="272" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#e1bee7" text-anchor="middle">우디의 자유 선택</text>
  <text x="795" y="292" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#e1bee7" text-anchor="middle">보 핍과의 재회</text>
  <text x="795" y="340" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#FFD700" text-anchor="middle">핵심 테마</text>
  <text x="795" y="362" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">자아 실현</text>
  <text x="795" y="380" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">주인 없이도 가치있는가</text>

  <!-- TS5 card (highlighted) -->
  <circle cx="1020" cy="92" r="14" fill="#FFD700" stroke="#ffffff" stroke-width="3"/>
  <rect x="900" y="105" width="230" height="410" rx="12" fill="url(#ts5)" stroke="#ffffff" stroke-width="2.5"/>
  <text x="1015" y="155" font-family="Arial Black, Arial, sans-serif" font-size="46" font-weight="900" fill="#1a1a1a" text-anchor="middle">5</text>
  <text x="1015" y="192" font-family="Arial, sans-serif" font-size="15" font-weight="900" fill="#1a1a1a" text-anchor="middle">2026년 6월</text>
  <rect x="920" y="205" width="190" height="2" fill="#1a1a1a" opacity="0.3"/>
  <text x="1015" y="238" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" font-weight="900" fill="#1a1a1a" text-anchor="middle">토이스토리 5</text>
  <text x="1015" y="272" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#1a1a1a" text-anchor="middle">디지털 장난감 릴리패드</text>
  <text x="1015" y="292" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#1a1a1a" text-anchor="middle">보니의 방 이야기</text>
  <text x="1015" y="335" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#1a1a1a" font-weight="700" text-anchor="middle">핵심 테마</text>
  <text x="1015" y="357" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#1a1a1a" text-anchor="middle">디지털 시대의 장난감</text>
  <text x="1015" y="377" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#1a1a1a" text-anchor="middle">아날로그의 가치</text>
  <rect x="930" y="400" width="170" height="30" rx="6" fill="#1a1a1a" opacity="0.15"/>
  <text x="1015" y="420" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13" fill="#1a1a1a" font-weight="700" text-anchor="middle">▶ 개봉 예정</text>
  <!-- Footer -->
  <text x="600" y="608" font-family="Arial, sans-serif" font-size="16" fill="#555555" text-anchor="middle">ambitstock.com | 1995–2026, 31년간의 장난감 이야기</text>
</svg>
