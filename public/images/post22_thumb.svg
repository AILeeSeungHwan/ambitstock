<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="accentH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Trophy / rank podium shapes right side -->
  <rect x="900" y="320" width="80" height="220" rx="6" fill="#1a73e8" opacity="0.12"/>
  <rect x="1000" y="250" width="80" height="290" rx="6" fill="#f59e0b" opacity="0.10"/>
  <rect x="800" y="370" width="80" height="170" rx="6" fill="#1a73e8" opacity="0.08"/>
  <!-- Rank number watermark -->
  <text x="1050" y="550" font-family="Georgia,serif" font-size="320" font-weight="900" fill="#1a73e8" opacity="0.05" text-anchor="middle">20</text>
  <!-- Decorative horizontal bars (chart-like) -->
  <rect x="820" y="290" width="300" height="6" rx="3" fill="#f59e0b" opacity="0.25"/>
  <rect x="850" y="320" width="260" height="6" rx="3" fill="#1a73e8" opacity="0.18"/>
  <rect x="870" y="350" width="220" height="6" rx="3" fill="#1a73e8" opacity="0.14"/>
  <rect x="890" y="380" width="180" height="6" rx="3" fill="#1a73e8" opacity="0.10"/>
  <rect x="910" y="410" width="140" height="6" rx="3" fill="#1a73e8" opacity="0.08"/>
  <!-- Korean flag colors stripe top -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#gold)" opacity="0.6"/>
  <!-- Left accent bar -->
  <rect x="78" y="155" width="7" height="310" fill="url(#accent)" rx="3"/>
  <!-- Category badge -->
  <rect x="108" y="155" width="176" height="38" rx="19" fill="#1a73e8"/>
  <text x="196" y="180" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">영화추천</text>
  <!-- Trophy emoji replacement — star shapes -->
  <polygon points="108,140 114,125 120,140 135,140 123,149 128,164 114,155 100,164 105,149 93,140" fill="#f59e0b" opacity="0.8"/>
  <!-- Main title -->
  <text x="108" y="290" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="88" font-weight="900" fill="white">한국 영화</text>
  <text x="108" y="388" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="88" font-weight="900" fill="url(#accentH)">흥행 TOP 20</text>
  <!-- Subtitle -->
  <text x="108" y="445" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="28" fill="#7ab8f5" opacity="0.85">역대 관객수 순위</text>
  <!-- Horizontal accent line -->
  <rect x="108" y="465" width="500" height="2" rx="1" fill="url(#gold)" opacity="0.5"/>
  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#000" opacity="0.2"/>
  <text x="600" y="608" font-family="'Apple SD Gothic Neo',sans-serif" font-size="20" fill="white" opacity="0.45" text-anchor="middle">ambitstock.com | R의 필름공장</text>
</svg>
