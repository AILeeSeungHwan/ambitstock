<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d47a1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a237e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6f00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffa000;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="0" y="0" width="1200" height="8" fill="url(#accent)" />
  <rect x="0" y="622" width="1200" height="8" fill="url(#accent)" />
  <!-- 배경 패턴 요소 -->
  <circle cx="100" cy="100" r="200" fill="white" opacity="0.03" />
  <circle cx="1100" cy="530" r="250" fill="white" opacity="0.03" />
  <!-- 아이콘 영역 -->
  <rect x="60" y="50" width="6" height="530" fill="url(#accent)" rx="3" />
  <!-- 카테고리 뱃지 -->
  <rect x="80" y="60" width="160" height="40" rx="20" fill="url(#accent)" />
  <text x="160" y="86" font-family="'Noto Sans KR', sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">드라마 · 트렌드</text>
  <!-- 메인 타이틀 -->
  <text x="80" y="180" font-family="'Noto Sans KR', sans-serif" font-size="62" font-weight="900" fill="white">취사병 전설이 되다</text>
  <!-- 서브 타이틀 -->
  <text x="80" y="265" font-family="'Noto Sans KR', sans-serif" font-size="38" font-weight="700" fill="#ffd54f">박지훈 · 총 대신 식칼 든 이등병</text>
  <!-- 구분선 -->
  <rect x="80" y="295" width="500" height="3" fill="url(#accent)" rx="1.5" />
  <!-- 설명 텍스트 -->
  <text x="80" y="345" font-family="'Noto Sans KR', sans-serif" font-size="28" fill="#e3f2fd">밀리터리 + 쿡방 + 판타지 퀘스트 성장물</text>
  <text x="80" y="390" font-family="'Noto Sans KR', sans-serif" font-size="28" fill="#e3f2fd">웹소설 원작 · tvN+티빙 동시 공개</text>
  <!-- 날짜 뱃지 -->
  <rect x="80" y="435" width="220" height="52" rx="10" fill="white" opacity="0.15" />
  <text x="190" y="467" font-family="'Noto Sans KR', sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">2026.05.11 공개</text>
  <!-- 우측 장식 -->
  <text x="1120" y="340" font-family="'Noto Sans KR', sans-serif" font-size="120" font-weight="900" fill="white" opacity="0.07" text-anchor="middle">요리</text>
  <!-- 출처 -->
  <text x="1180" y="610" font-family="'Noto Sans KR', sans-serif" font-size="18" fill="white" opacity="0.5" text-anchor="end">ambitstock.com</text>
</svg>
