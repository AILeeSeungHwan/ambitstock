<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1f;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5e06e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#d4af37" opacity="0.04"/>
  <circle cx="1100" cy="530" r="250" fill="#4a4a8e" opacity="0.08"/>
  <circle cx="600" cy="315" r="400" fill="#1a1a2e" opacity="0.3"/>
  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#goldGrad)" />
  <!-- Bottom accent line -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#goldGrad)" />
  <!-- Marvel label -->
  <rect x="80" y="80" width="130" height="36" rx="4" fill="#d4af37"/>
  <text x="145" y="104" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="900" fill="#1a1a2e" text-anchor="middle">MARVEL</text>
  <!-- Phase label -->
  <rect x="228" y="80" width="150" height="36" rx="4" fill="none" stroke="#d4af37" stroke-width="2"/>
  <text x="303" y="104" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#d4af37" text-anchor="middle">PHASE 6</text>
  <!-- Main title -->
  <text x="600" y="270" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="88" font-weight="900" fill="url(#goldGrad)" text-anchor="middle" filter="url(#glow)">어벤져스: 둠스데이</text>
  <!-- Subtitle line -->
  <rect x="300" y="300" width="600" height="3" rx="1" fill="url(#goldGrad)" opacity="0.7"/>
  <!-- Subtitle text -->
  <text x="600" y="370" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="38" font-weight="400" fill="#ffffff" text-anchor="middle" opacity="0.9">MCU 역사상 가장 큰 앙상블</text>
  <!-- Date badge -->
  <rect x="440" y="420" width="320" height="52" rx="26" fill="#d4af37" opacity="0.15" stroke="#d4af37" stroke-width="1.5"/>
  <text x="600" y="453" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#d4af37" text-anchor="middle">2026.12.18 개봉 예정</text>
  <!-- Director -->
  <text x="600" y="530" font-family="Arial, sans-serif" font-size="22" fill="#aaaaaa" text-anchor="middle">감독: 루소 형제 | 루소 형제 복귀</text>
  <!-- Site label -->
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="18" fill="#666666" text-anchor="middle">ambitstock.com</text>
</svg>
