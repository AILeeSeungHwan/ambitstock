<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004d40;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00695c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00897b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffee58;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd600;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="980" cy="180" r="220" fill="white" opacity="0.04"/>
  <circle cx="980" cy="180" r="160" fill="white" opacity="0.05"/>
  <circle cx="980" cy="180" r="100" fill="white" opacity="0.06"/>

  <!-- Small decorative dots -->
  <circle cx="100" cy="80" r="4" fill="white" opacity="0.2"/>
  <circle cx="200" cy="50" r="3" fill="white" opacity="0.15"/>
  <circle cx="60" cy="400" r="5" fill="white" opacity="0.1"/>
  <circle cx="150" cy="560" r="3" fill="white" opacity="0.15"/>

  <!-- Left accent bar -->
  <rect x="80" y="160" width="7" height="300" fill="url(#accent)" rx="3"/>

  <!-- Category badge -->
  <rect x="110" y="160" width="170" height="38" rx="19" fill="#004d40" opacity="0.8"/>
  <rect x="110" y="160" width="170" height="38" rx="19" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <text x="195" y="184" font-family="'Noto Sans KR', Arial, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">픽사 애니메이션</text>

  <!-- Main title -->
  <text x="110" y="275" font-family="'Noto Sans KR', Arial, sans-serif" font-size="100" font-weight="900" fill="white" filter="url(#glow)">호퍼스</text>

  <!-- Subtitle line -->
  <rect x="110" y="295" width="380" height="5" fill="url(#accent)" rx="2"/>

  <!-- Subtitle text -->
  <text x="110" y="345" font-family="'Noto Sans KR', Arial, sans-serif" font-size="30" font-weight="600" fill="url(#accent)">픽사 × 2026</text>

  <!-- Description -->
  <text x="110" y="395" font-family="'Noto Sans KR', Arial, sans-serif" font-size="22" fill="white" opacity="0.9">픽사 30번째 장편 오리지널</text>
  <text x="110" y="425" font-family="'Noto Sans KR', Arial, sans-serif" font-size="22" fill="white" opacity="0.9">코코 이후 최고 픽사 영화</text>

  <!-- Rating badges -->
  <rect x="110" y="455" width="200" height="50" rx="10" fill="#004d40" opacity="0.7"/>
  <rect x="110" y="455" width="200" height="50" rx="10" fill="none" stroke="#ffee58" stroke-width="1.5" opacity="0.6"/>
  <text x="210" y="476" font-family="'Noto Sans KR', Arial, sans-serif" font-size="13" fill="#ffee58" text-anchor="middle" opacity="0.9">로튼토마토</text>
  <text x="210" y="497" font-family="'Noto Sans KR', Arial, sans-serif" font-size="20" font-weight="700" fill="#ffee58" text-anchor="middle">94% / 94%</text>

  <rect x="325" y="455" width="200" height="50" rx="10" fill="#004d40" opacity="0.7"/>
  <rect x="325" y="455" width="200" height="50" rx="10" fill="none" stroke="white" stroke-width="1" opacity="0.4"/>
  <text x="425" y="476" font-family="'Noto Sans KR', Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" opacity="0.8">국내 누적</text>
  <text x="425" y="497" font-family="'Noto Sans KR', Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">53만+ 관객</text>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#004d40" opacity="0.5"/>
  <text x="600" y="608" font-family="'Noto Sans KR', Arial, sans-serif" font-size="20" fill="#b2dfdb" text-anchor="middle" opacity="0.9">북미 첫 주 1위  ·  국내 2주 연속 외화 1위  |  ambitstock.com</text>
</svg>
