<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg475" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#4a0000"/>
    </linearGradient>
    <linearGradient id="accent475" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e50914"/>
      <stop offset="100%" stop-color="#ff1744"/>
    </linearGradient>
    <radialGradient id="glow475" cx="75%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#e50914" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#e50914" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg475)"/>
  <!-- Radial glow from top right -->
  <rect width="1200" height="630" fill="url(#glow475)"/>
  <!-- Calendar grid decorative motif -->
  <rect x="820" y="100" width="320" height="360" rx="14" fill="none" stroke="#e50914" stroke-width="1.5" stroke-opacity="0.18"/>
  <line x1="820" y1="155" x2="1140" y2="155" stroke="#e50914" stroke-width="1" stroke-opacity="0.14"/>
  <!-- Calendar header block -->
  <rect x="820" y="100" width="320" height="55" rx="14" fill="#e50914" fill-opacity="0.12"/>
  <text x="980" y="132" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="700" fill="#ff6659" fill-opacity="0.7" text-anchor="middle">APRIL 2026</text>
  <!-- Calendar grid lines -->
  <line x1="866" y1="155" x2="866" y2="460" stroke="#e50914" stroke-width="1" stroke-opacity="0.1"/>
  <line x1="912" y1="155" x2="912" y2="460" stroke="#e50914" stroke-width="1" stroke-opacity="0.1"/>
  <line x1="958" y1="155" x2="958" y2="460" stroke="#e50914" stroke-width="1" stroke-opacity="0.1"/>
  <line x1="1004" y1="155" x2="1004" y2="460" stroke="#e50914" stroke-width="1" stroke-opacity="0.1"/>
  <line x1="1050" y1="155" x2="1050" y2="460" stroke="#e50914" stroke-width="1" stroke-opacity="0.1"/>
  <line x1="1096" y1="155" x2="1096" y2="460" stroke="#e50914" stroke-width="1" stroke-opacity="0.1"/>
  <line x1="820" y1="215" x2="1140" y2="215" stroke="#e50914" stroke-width="1" stroke-opacity="0.1"/>
  <line x1="820" y1="275" x2="1140" y2="275" stroke="#e50914" stroke-width="1" stroke-opacity="0.1"/>
  <line x1="820" y1="335" x2="1140" y2="335" stroke="#e50914" stroke-width="1" stroke-opacity="0.1"/>
  <line x1="820" y1="395" x2="1140" y2="395" stroke="#e50914" stroke-width="1" stroke-opacity="0.1"/>
  <!-- Highlighted calendar cells -->
  <rect x="866" y="215" width="46" height="60" rx="4" fill="#e50914" fill-opacity="0.3"/>
  <rect x="1004" y="275" width="46" height="60" rx="4" fill="#e50914" fill-opacity="0.25"/>
  <rect x="912" y="335" width="46" height="60" rx="4" fill="#e50914" fill-opacity="0.2"/>
  <!-- Accent bar -->
  <rect x="80" y="175" width="6" height="280" fill="url(#accent475)" rx="3"/>
  <!-- Badge -->
  <rect x="110" y="175" width="180" height="38" rx="19" fill="#e50914"/>
  <text x="200" y="194" font-family="'Segoe UI','Malgun Gothic',Arial,sans-serif" font-size="17" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="middle">넷플릭스</text>
  <!-- Titles -->
  <text x="110" y="308" font-family="'Segoe UI','Malgun Gothic',Arial,sans-serif" font-size="84" font-weight="900" fill="white" letter-spacing="-2">넷플릭스 4월</text>
  <text x="110" y="405" font-family="'Segoe UI','Malgun Gothic',Arial,sans-serif" font-size="84" font-weight="900" fill="url(#accent475)" letter-spacing="-2">신작 총정리</text>
  <!-- Subtitle -->
  <text x="110" y="462" font-family="'Segoe UI','Malgun Gothic',Arial,sans-serif" font-size="25" fill="#ff8a80" letter-spacing="0.5">2026년 4월 라인업 — 놓치면 후회할 작품들</text>
  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#000" fill-opacity="0.40"/>
  <rect x="0" y="570" width="1200" height="3" fill="url(#accent475)"/>
  <text x="600" y="603" font-family="'Segoe UI',Arial,sans-serif" font-size="19" fill="white" fill-opacity="0.65" text-anchor="middle" dominant-baseline="middle" letter-spacing="3">ambitstock.com | R의 필름공장</text>
