<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a1b9a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ad1457;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e91e63;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f06292;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ce93d8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="0" y="0" width="1200" height="630" fill="rgba(0,0,0,0.18)" />
  <!-- decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="rgba(255,255,255,0.06)" />
  <circle cx="150" cy="520" r="130" fill="rgba(255,255,255,0.06)" />
  <!-- badge -->
  <rect x="80" y="80" width="200" height="42" rx="21" fill="url(#badge)" />
  <text x="180" y="108" font-family="'Noto Sans KR', sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">트렌드 오늘 공개</text>
  <!-- platform badge -->
  <rect x="300" y="80" width="200" height="42" rx="21" fill="rgba(255,80,80,0.85)" />
  <text x="400" y="108" font-family="'Noto Sans KR', sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">쿠팡플레이 오리지널</text>
  <!-- main title -->
  <text x="80" y="220" font-family="'Noto Sans KR', sans-serif" font-size="72" font-weight="900" fill="white">로맨스의 절댓값</text>
  <!-- subtitle -->
  <text x="80" y="300" font-family="'Noto Sans KR', sans-serif" font-size="38" font-weight="700" fill="#f8bbd0">BL 작가 이중생활 하이틴 드라마</text>
  <!-- description -->
  <text x="80" y="380" font-family="'Noto Sans KR', sans-serif" font-size="30" fill="rgba(255,255,255,0.9)">김향기 × 차학연 주연</text>
  <text x="80" y="425" font-family="'Noto Sans KR', sans-serif" font-size="30" fill="rgba(255,255,255,0.9)">낮엔 여고생, 밤엔 BL 소설 작가</text>
  <!-- divider line -->
  <rect x="80" y="465" width="600" height="3" rx="2" fill="rgba(255,255,255,0.4)" />
  <!-- meta -->
  <text x="80" y="510" font-family="'Noto Sans KR', sans-serif" font-size="24" fill="rgba(255,255,255,0.7)">2026년 4월 17일 공개 · 쿠팡플레이</text>
  <!-- site tag -->
  <text x="1120" y="600" font-family="'Noto Sans KR', sans-serif" font-size="22" fill="rgba(255,255,255,0.5)" text-anchor="end">ambitstock.com</text>
</svg>
