<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="50%" style="stop-color:#2d0a0a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="#8b0000" opacity="0.8"/>
  <rect x="0" y="626" width="1200" height="4" fill="#8b0000" opacity="0.8"/>
  <text x="600" y="200" text-anchor="middle" font-family="'Noto Sans KR', sans-serif" font-size="96" font-weight="900" fill="#e53935" filter="url(#glow)">살목지</text>
  <text x="600" y="290" text-anchor="middle" font-family="'Noto Sans KR', sans-serif" font-size="36" font-weight="400" fill="#cccccc">설명 불가 · 저항 불가 · 탈출 불가</text>
  <text x="600" y="370" text-anchor="middle" font-family="'Noto Sans KR', sans-serif" font-size="30" font-weight="700" fill="#ffffff">김혜윤 · 이종원 · 장다아</text>
  <text x="600" y="430" text-anchor="middle" font-family="'Noto Sans KR', sans-serif" font-size="28" font-weight="400" fill="#ff6b6b">4월 8일 극장 개봉</text>
  <line x1="400" y1="470" x2="800" y2="470" stroke="#8b0000" stroke-width="1" opacity="0.5"/>
  <text x="600" y="520" text-anchor="middle" font-family="'Noto Sans KR', sans-serif" font-size="22" font-weight="300" fill="#888888">사전 정보 · 관람 포인트 · 추천 대상</text>
  <text x="600" y="570" text-anchor="middle" font-family="'Noto Sans KR', sans-serif" font-size="18" font-weight="300" fill="#555555">ambitstock.com</text>
</svg>