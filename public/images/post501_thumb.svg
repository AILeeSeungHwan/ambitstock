<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0010;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#1a0022;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a0080;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#8b0000;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#5a0080;stop-opacity:0" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="4" />
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Atmospheric dark mist layers -->
  <ellipse cx="150" cy="520" rx="450" ry="140" fill="#4a0060" opacity="0.1" filter="url(#blur)" />
  <ellipse cx="950" cy="480" rx="380" ry="130" fill="#8b0000" opacity="0.1" filter="url(#blur)" />
  <ellipse cx="600" cy="600" rx="650" ry="90" fill="#3d0050" opacity="0.18" filter="url(#blur)" />

  <!-- Horizontal glow band -->
  <rect x="0" y="260" width="1200" height="100" fill="url(#glow)" />

  <!-- Gothic decorative vertical lines -->
  <line x1="75" y1="0" x2="75" y2="630" stroke="#8b0066" stroke-width="0.6" opacity="0.25" />
  <line x1="1125" y1="0" x2="1125" y2="630" stroke="#8b0066" stroke-width="0.6" opacity="0.25" />

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="#c9a0dc" opacity="0.7" />

  <!-- Badge: 영화 추천 -->
  <rect x="60" y="48" width="130" height="36" rx="18" fill="#8b0066" opacity="0.9" />
  <text x="125" y="71" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">영화 추천</text>

  <!-- Year badge -->
  <rect x="205" y="48" width="90" height="36" rx="18" fill="none" stroke="#c9a0dc" stroke-width="1.5" opacity="0.7" />
  <text x="250" y="71" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="600" fill="#c9a0dc" text-anchor="middle">2026</text>

  <!-- Director label -->
  <text x="60" y="155" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="20" font-weight="500" fill="#c9a0dc" opacity="0.85" text-anchor="start">매기 질렌할 감독 · 연출 데뷔작</text>

  <!-- Main Korean title -->
  <text x="60" y="275" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="120" font-weight="900" fill="#f0e6ff" opacity="0.96" text-anchor="start" filter="url(#textglow)">브라이드</text>

  <!-- English title -->
  <text x="68" y="335" font-family="'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="300" fill="#c9a0dc" opacity="0.8" text-anchor="start" letter-spacing="14">The Bride!</text>

  <!-- Divider -->
  <rect x="60" y="362" width="360" height="2" fill="#c9a0dc" opacity="0.55" />

  <!-- Subtitle line 1 -->
  <text x="60" y="400" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="25" font-weight="700" fill="#ffffff" opacity="0.92" text-anchor="start">크리스찬 베일 × 제시 버클리 — 고딕 로맨스</text>

  <!-- Subtitle line 2 -->
  <text x="60" y="438" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="21" font-weight="400" fill="#b8a0c8" opacity="0.85" text-anchor="start">1930년대 시카고 · 프랑켄슈타인의 신부 · 3월 개봉</text>

  <!-- Right side gothic ornament: circle/rune -->
  <circle cx="985" cy="310" r="115" fill="#5a0080" opacity="0.1" />
  <circle cx="985" cy="310" r="95" fill="none" stroke="#c9a0dc" stroke-width="1.5" opacity="0.35" />
  <circle cx="985" cy="310" r="70" fill="none" stroke="#8b0066" stroke-width="1" opacity="0.3" />
  <text x="985" y="285" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#c9a0dc" text-anchor="middle" opacity="0.85">3월 개봉</text>
  <text x="985" y="340" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="42" font-weight="900" fill="#e8c0ff" text-anchor="middle" opacity="0.9" filter="url(#textglow)">BRIDE</text>
  <text x="985" y="370" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="17" font-weight="500" fill="#c9a0dc" text-anchor="middle" opacity="0.75">고딕 로맨스</text>

  <!-- Bottom bar -->
  <rect x="0" y="568" width="1200" height="62" fill="#000000" opacity="0.65" />
  <text x="60" y="604" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="400" fill="#c9a0dc" opacity="0.7" text-anchor="start">ambitstock.com — R의 필름공장</text>
  <text x="1140" y="604" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="400" fill="#c9a0dc" opacity="0.7" text-anchor="end">프랑켄슈타인의 신부 · 1935</text>

  <!-- Bottom accent -->
  <rect x="0" y="626" width="1200" height="4" fill="#8b0066" opacity="0.6" />
</svg>
