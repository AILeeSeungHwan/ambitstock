<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1f"/>
      <stop offset="50%" style="stop-color:#0f0f25"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a94e"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#42a5f5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Timeline visualization right side -->
  <!-- Vertical timeline line -->
  <line x1="940" y1="60" x2="940" y2="560" stroke="#c9a94e" stroke-width="2" opacity="0.2"/>
  <!-- Phase nodes on timeline -->
  <circle cx="940" cy="130" r="12" fill="#1a1a2e" stroke="#ffd700" stroke-width="2" opacity="0.7"/>
  <text x="940" y="135" font-family="Arial Black, Arial, sans-serif" font-size="12" font-weight="900" fill="#ffd700" text-anchor="middle" opacity="0.8">4</text>
  <rect x="960" y="118" width="110" height="24" rx="12" fill="#ffd700" opacity="0.12"/>
  <text x="1015" y="134" font-family="Arial, sans-serif" font-size="13" fill="#ffd700" text-anchor="middle" opacity="0.65">Phase 4</text>
  <circle cx="940" cy="230" r="12" fill="#1a1a2e" stroke="#ffd700" stroke-width="2" opacity="0.7"/>
  <text x="940" y="235" font-family="Arial Black, Arial, sans-serif" font-size="12" font-weight="900" fill="#ffd700" text-anchor="middle" opacity="0.8">5</text>
  <rect x="960" y="218" width="110" height="24" rx="12" fill="#ffd700" opacity="0.15"/>
  <text x="1015" y="234" font-family="Arial, sans-serif" font-size="13" fill="#ffd700" text-anchor="middle" opacity="0.7">Phase 5</text>
  <circle cx="940" cy="330" r="14" fill="#ffd700" opacity="0.25" stroke="#ffd700" stroke-width="2.5" opacity="0.8"/>
  <text x="940" y="336" font-family="Arial Black, Arial, sans-serif" font-size="14" font-weight="900" fill="#ffd700" text-anchor="middle" opacity="0.9">6</text>
  <rect x="960" y="316" width="130" height="28" rx="14" fill="#ffd700" opacity="0.2"/>
  <text x="1025" y="335" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffd700" text-anchor="middle" opacity="0.8">Phase 6 ★</text>
  <circle cx="940" cy="420" r="10" fill="#1a1a2e" stroke="#c9a94e" stroke-width="1.5" opacity="0.5"/>
  <text x="940" y="425" font-family="Arial Black, Arial, sans-serif" font-size="10" font-weight="900" fill="#c9a94e" text-anchor="middle" opacity="0.5">7</text>
  <rect x="960" y="410" width="100" height="20" rx="10" fill="#c9a94e" opacity="0.08"/>
  <text x="1010" y="424" font-family="Arial, sans-serif" font-size="12" fill="#c9a94e" text-anchor="middle" opacity="0.45">Phase 7?</text>
  <!-- Connection arrows on timeline -->
  <polygon points="937,148 943,148 940,162" fill="#c9a94e" opacity="0.3"/>
  <polygon points="937,248 943,248 940,262" fill="#c9a94e" opacity="0.3"/>
  <polygon points="937,348 943,348 940,362" fill="#c9a94e" opacity="0.25"/>
  <!-- Star field top -->
  <circle cx="120" cy="45" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="240" cy="25" r="1" fill="#ffd700" opacity="0.4"/>
  <circle cx="380" cy="50" r="2" fill="white" opacity="0.3"/>
  <circle cx="510" cy="30" r="1.5" fill="white" opacity="0.35"/>
  <circle cx="650" cy="55" r="1" fill="#ffd700" opacity="0.35"/>
  <circle cx="800" cy="35" r="1.5" fill="white" opacity="0.3"/>
  <!-- Hexagon network left top -->
  <polygon points="130,90 155,76 180,90 180,118 155,132 130,118" fill="none" stroke="#c9a94e" stroke-width="1" opacity="0.15"/>
  <polygon points="170,118 195,104 220,118 220,146 195,160 170,146" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.12"/>
  <!-- Left accent bar -->
  <rect x="80" y="155" width="7" height="310" fill="url(#gold)" rx="3.5"/>
  <!-- Category badge -->
  <rect x="106" y="155" width="100" height="38" rx="19" fill="#1a1a2e" stroke="#c9a94e" stroke-width="1.5" opacity="0.95"/>
  <text x="156" y="179" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffd700" text-anchor="middle">마블</text>
  <!-- MCU badge -->
  <rect x="220" y="155" width="120" height="38" rx="19" fill="#ffffff" opacity="0.07"/>
  <text x="280" y="179" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#f5deb3" text-anchor="middle" opacity="0.8">MCU</text>
  <!-- Main title line 1 -->
  <text x="106" y="290" font-family="Arial Black, Arial, sans-serif" font-size="80" font-weight="900" fill="white" letter-spacing="-2">MCU 페이즈 6</text>
  <!-- Main title line 2 -->
  <text x="106" y="378" font-family="Arial Black, Arial, sans-serif" font-size="78" font-weight="900" fill="url(#gold)" letter-spacing="-2">타임라인 가이드</text>
  <!-- Subtitle -->
  <text x="106" y="434" font-family="Arial, sans-serif" font-size="25" font-weight="400" fill="#f5deb3" opacity="0.85">연결고리 총정리 · 시청 순서 · 전체 흐름</text>
  <!-- Divider -->
  <rect x="106" y="457" width="360" height="3" fill="url(#gold)" rx="1.5" opacity="0.5"/>
  <!-- Bottom bar -->
  <rect x="0" y="572" width="1200" height="58" fill="#c9a94e" opacity="0.1"/>
  <text x="600" y="609" font-family="Arial, sans-serif" font-size="19" fill="#f5deb3" text-anchor="middle" opacity="0.85">ambitstock.com | R의 필름공장</text>
</svg>
