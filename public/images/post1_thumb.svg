<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0000"/>
      <stop offset="60%" style="stop-color:#3d0000"/>
      <stop offset="100%" style="stop-color:#4a0000"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e50914"/>
      <stop offset="100%" style="stop-color:#ff1744"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="315" fill="url(#shine)"/>
  <!-- Film strip right decoration -->
  <rect x="1010" y="0" width="70" height="630" fill="#000000" opacity="0.35"/>
  <rect x="1022" y="15" width="46" height="32" rx="5" fill="#1a0000" opacity="0.9"/>
  <rect x="1022" y="63" width="46" height="32" rx="5" fill="#1a0000" opacity="0.9"/>
  <rect x="1022" y="111" width="46" height="32" rx="5" fill="#1a0000" opacity="0.9"/>
  <rect x="1022" y="159" width="46" height="32" rx="5" fill="#1a0000" opacity="0.9"/>
  <rect x="1022" y="207" width="46" height="32" rx="5" fill="#1a0000" opacity="0.9"/>
  <rect x="1022" y="255" width="46" height="32" rx="5" fill="#1a0000" opacity="0.9"/>
  <rect x="1022" y="303" width="46" height="32" rx="5" fill="#1a0000" opacity="0.9"/>
  <rect x="1022" y="351" width="46" height="32" rx="5" fill="#1a0000" opacity="0.9"/>
  <rect x="1022" y="399" width="46" height="32" rx="5" fill="#1a0000" opacity="0.9"/>
  <rect x="1022" y="447" width="46" height="32" rx="5" fill="#1a0000" opacity="0.9"/>
  <rect x="1022" y="495" width="46" height="32" rx="5" fill="#1a0000" opacity="0.9"/>
  <rect x="1022" y="543" width="46" height="32" rx="5" fill="#1a0000" opacity="0.9"/>
  <rect x="1022" y="591" width="46" height="32" rx="5" fill="#1a0000" opacity="0.9"/>
  <!-- Watermark N -->
  <text x="820" y="480" font-family="Arial Black, Arial, sans-serif" font-size="380" font-weight="900" fill="#e50914" opacity="0.06">N</text>
  <!-- Diagonal accent lines -->
  <line x1="0" y1="620" x2="880" y2="0" stroke="#e50914" stroke-width="1.5" opacity="0.1"/>
  <line x1="120" y1="630" x2="1000" y2="0" stroke="#e50914" stroke-width="1" opacity="0.07"/>
  <!-- Left accent bar -->
  <rect x="80" y="168" width="7" height="294" fill="url(#acc)" rx="3.5"/>
  <!-- Category badge -->
  <rect x="106" y="168" width="148" height="38" rx="19" fill="#e50914" opacity="0.95"/>
  <text x="180" y="192" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="white" text-anchor="middle">넷플릭스</text>
  <!-- Month badge -->
  <rect x="268" y="168" width="128" height="38" rx="19" fill="#ffffff" opacity="0.11"/>
  <text x="332" y="192" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#ffcccc" text-anchor="middle">2026년 3월</text>
  <!-- Main title line 1 -->
  <text x="106" y="302" font-family="Arial Black, Arial, sans-serif" font-size="80" font-weight="900" fill="white" letter-spacing="-2">넷플릭스 3월</text>
  <!-- Main title line 2 with gradient -->
  <text x="106" y="390" font-family="Arial Black, Arial, sans-serif" font-size="80" font-weight="900" fill="url(#acc)" letter-spacing="-2">신작 총정리</text>
  <!-- Subtitle -->
  <text x="106" y="445" font-family="Arial, sans-serif" font-size="26" font-weight="400" fill="#ffaaaa" opacity="0.88">2026년 3월 공개 · 화제작 · 숨은 명작</text>
  <!-- Divider line -->
  <rect x="106" y="468" width="300" height="3" fill="url(#acc)" rx="1.5" opacity="0.55"/>
  <!-- Bottom accent bar -->
  <rect x="0" y="572" width="1200" height="58" fill="#e50914" opacity="0.11"/>
  <text x="600" y="609" font-family="Arial, sans-serif" font-size="19" fill="#ffaaaa" text-anchor="middle" opacity="0.88">ambitstock.com | R의 필름공장</text>
