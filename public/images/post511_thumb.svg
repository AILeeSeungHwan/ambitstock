<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a0080;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6a1b9a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#880e4f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#80d8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b3e5fc;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Decorative circles -->
  <circle cx="200" cy="500" r="300" fill="#ffffff" opacity="0.03" />
  <circle cx="1000" cy="150" r="250" fill="#ffffff" opacity="0.03" />
  <!-- Top badge -->
  <rect x="60" y="60" width="200" height="44" rx="22" fill="url(#accent)" opacity="0.9" />
  <text x="160" y="88" font-family="'Noto Sans KR', Arial, sans-serif" font-size="18" font-weight="700" fill="#4a0080" text-anchor="middle">드라마 추천 비교</text>
  <!-- Main title -->
  <text x="60" y="200" font-family="'Noto Sans KR', Arial, sans-serif" font-size="56" font-weight="900" fill="#ffffff">2026 봄 넷플릭스</text>
  <text x="60" y="275" font-family="'Noto Sans KR', Arial, sans-serif" font-size="66" font-weight="900" fill="url(#accent)">K로맨스 2강</text>
  <!-- Subtitle -->
  <text x="60" y="355" font-family="'Noto Sans KR', Arial, sans-serif" font-size="34" fill="#e1bee7">월간남친 vs 샤이닝 — 어떤 게 나한테 맞을까</text>
  <!-- Divider -->
  <rect x="60" y="393" width="120" height="4" fill="url(#accent)" opacity="0.8" />
  <!-- Description -->
  <text x="60" y="450" font-family="'Noto Sans KR', Arial, sans-serif" font-size="26" fill="#ce93d8">취향별 추천 + 글로벌 차트 성과 + 시청 순서 가이드</text>
  <!-- Tags -->
  <rect x="60" y="500" width="90" height="38" rx="8" fill="#ffffff" opacity="0.15" />
  <text x="105" y="524" font-family="'Noto Sans KR', Arial, sans-serif" font-size="18" fill="#80d8ff" text-anchor="middle" font-weight="700">드라마</text>
  <rect x="168" y="500" width="120" height="38" rx="8" fill="#ffffff" opacity="0.15" />
  <text x="228" y="524" font-family="'Noto Sans KR', Arial, sans-serif" font-size="18" fill="#e1bee7" text-anchor="middle">넷플릭스</text>
  <rect x="308" y="500" width="120" height="38" rx="8" fill="#ffffff" opacity="0.15" />
  <text x="368" y="524" font-family="'Noto Sans KR', Arial, sans-serif" font-size="18" fill="#e1bee7" text-anchor="middle">2026 봄</text>
  <!-- Site name -->
  <text x="1140" y="60" font-family="'Noto Sans KR', Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.4)" text-anchor="end">ambitstock.com</text>
</svg>
