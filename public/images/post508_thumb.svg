<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1f0a;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#1b3a1b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a017;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0c040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a017;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a1e;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0f1f0f;stop-opacity:0.9" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern (casino felt texture) -->
  <pattern id="feltGrid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e4a1e" stroke-width="0.5" opacity="0.4"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#feltGrid)" opacity="0.5"/>

  <!-- Decorative corner diamonds -->
  <g opacity="0.15">
    <polygon points="0,0 80,0 0,80" fill="#d4a017"/>
    <polygon points="1200,0 1120,0 1200,80" fill="#d4a017"/>
    <polygon points="0,630 80,630 0,550" fill="#d4a017"/>
    <polygon points="1200,630 1120,630 1200,550" fill="#d4a017"/>
  </g>

  <!-- Playing card decorations — left side -->
  <!-- Card 1: Spade -->
  <g transform="translate(60, 120)" filter="url(#shadow)">
    <rect width="90" height="130" rx="8" ry="8" fill="url(#cardGrad)" stroke="#d4a017" stroke-width="1.5"/>
    <text x="10" y="24" font-family="Georgia, serif" font-size="18" fill="#d4a017" font-weight="bold">A</text>
    <!-- Spade symbol -->
    <text x="28" y="80" font-family="Arial, sans-serif" font-size="40" fill="#1a1a1a" text-anchor="middle">♠</text>
    <text x="80" y="128" font-family="Georgia, serif" font-size="18" fill="#d4a017" font-weight="bold" transform="rotate(180,80,120)">A</text>
  </g>

  <!-- Card 2: Heart (overlapping) -->
  <g transform="translate(110, 160)" filter="url(#shadow)">
    <rect width="90" height="130" rx="8" ry="8" fill="#f5f0e0" stroke="#d4a017" stroke-width="1.5"/>
    <text x="10" y="24" font-family="Georgia, serif" font-size="18" fill="#c0392b" font-weight="bold">K</text>
    <text x="28" y="80" font-family="Arial, sans-serif" font-size="40" fill="#c0392b" text-anchor="middle">♥</text>
    <text x="80" y="128" font-family="Georgia, serif" font-size="18" fill="#c0392b" font-weight="bold" transform="rotate(180,80,120)">K</text>
  </g>

  <!-- Card 3: Diamond -->
  <g transform="translate(90, 220)" filter="url(#shadow)" opacity="0.7">
    <rect width="90" height="130" rx="8" ry="8" fill="url(#cardGrad)" stroke="#d4a017" stroke-width="1.5"/>
    <text x="10" y="24" font-family="Georgia, serif" font-size="18" fill="#d4a017" font-weight="bold">Q</text>
    <text x="28" y="80" font-family="Arial, sans-serif" font-size="40" fill="#d4a017" text-anchor="middle">♦</text>
  </g>

  <!-- Card decorations — right side -->
  <g transform="translate(990, 140)" filter="url(#shadow)" opacity="0.8">
    <rect width="90" height="130" rx="8" ry="8" fill="#f5f0e0" stroke="#d4a017" stroke-width="1.5"/>
    <text x="10" y="24" font-family="Georgia, serif" font-size="18" fill="#1a1a1a" font-weight="bold">J</text>
    <text x="28" y="80" font-family="Arial, sans-serif" font-size="40" fill="#1a1a1a" text-anchor="middle">♣</text>
    <text x="80" y="128" font-family="Georgia, serif" font-size="18" fill="#1a1a1a" font-weight="bold" transform="rotate(180,80,120)">J</text>
  </g>

  <g transform="translate(1040, 190)" filter="url(#shadow)" opacity="0.65">
    <rect width="90" height="130" rx="8" ry="8" fill="url(#cardGrad)" stroke="#d4a017" stroke-width="1.5"/>
    <text x="10" y="24" font-family="Georgia, serif" font-size="18" fill="#d4a017" font-weight="bold">A</text>
    <text x="28" y="80" font-family="Arial, sans-serif" font-size="40" fill="#d4a017" text-anchor="middle">♠</text>
  </g>

  <!-- Poker chips — scattered -->
  <!-- Chip 1 -->
  <g transform="translate(80, 430)">
    <circle r="28" fill="#c0392b" stroke="#d4a017" stroke-width="3"/>
    <circle r="22" fill="none" stroke="#d4a017" stroke-width="1.5" stroke-dasharray="5,4"/>
    <text x="0" y="5" font-family="Georgia, serif" font-size="11" fill="#f0c040" text-anchor="middle" font-weight="bold">100</text>
  </g>
  <!-- Chip 2 -->
  <g transform="translate(130, 460)">
    <circle r="24" fill="#2c3e8a" stroke="#d4a017" stroke-width="3"/>
    <circle r="18" fill="none" stroke="#f0c040" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="0" y="5" font-family="Georgia, serif" font-size="10" fill="#f0c040" text-anchor="middle" font-weight="bold">500</text>
  </g>
  <!-- Chip 3 -->
  <g transform="translate(1080, 430)">
    <circle r="28" fill="#1b5e20" stroke="#d4a017" stroke-width="3"/>
    <circle r="22" fill="none" stroke="#f0c040" stroke-width="1.5" stroke-dasharray="5,4"/>
    <text x="0" y="5" font-family="Georgia, serif" font-size="10" fill="#f0c040" text-anchor="middle" font-weight="bold">1000</text>
  </g>
  <!-- Chip 4 -->
  <g transform="translate(1120, 470)">
    <circle r="22" fill="#7b1fa2" stroke="#d4a017" stroke-width="2.5"/>
    <circle r="16" fill="none" stroke="#f0c040" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="0" y="5" font-family="Georgia, serif" font-size="9" fill="#f0c040" text-anchor="middle" font-weight="bold">50</text>
  </g>

  <!-- Gold decorative divider lines -->
  <line x1="200" y1="140" x2="1000" y2="140" stroke="url(#goldGrad)" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="490" x2="1000" y2="490" stroke="url(#goldGrad)" stroke-width="1" opacity="0.4"/>

  <!-- Category badge -->
  <rect x="460" y="100" width="280" height="40" rx="20" fill="#d4a017" opacity="0.95" filter="url(#glow)"/>
  <text x="600" y="127" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="18" fill="#0a1f0a" text-anchor="middle" font-weight="bold">영화 추천 · 2026 기대작</text>

  <!-- TAZZA4 main title -->
  <text x="600" y="240" font-family="Georgia, 'Nanum Gothic', sans-serif" font-size="88" fill="url(#goldGrad)" text-anchor="middle" font-weight="bold" filter="url(#textGlow)" letter-spacing="4">타짜4</text>

  <!-- Subtitle: Beelzebub's Song -->
  <text x="600" y="310" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="38" fill="#ffffff" text-anchor="middle" font-weight="bold" filter="url(#shadow)">벨제붑의 노래</text>

  <!-- Decorative gold underline -->
  <rect x="350" y="325" width="500" height="3" rx="2" fill="url(#goldGrad)" opacity="0.9"/>

  <!-- Series badge -->
  <text x="600" y="385" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="22" fill="#d4a017" text-anchor="middle" letter-spacing="2">시리즈 피날레 · 원작 완결편</text>

  <!-- Key info tags -->
  <g transform="translate(340, 415)">
    <!-- Tag 1 -->
    <rect width="140" height="36" rx="6" fill="#1b3a1b" stroke="#d4a017" stroke-width="1.2"/>
    <text x="70" y="23" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="14" fill="#f0c040" text-anchor="middle">한국 범죄 영화</text>
  </g>
  <g transform="translate(500, 415)">
    <!-- Tag 2 -->
    <rect width="140" height="36" rx="6" fill="#1b3a1b" stroke="#d4a017" stroke-width="1.2"/>
    <text x="70" y="23" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="14" fill="#f0c040" text-anchor="middle">도박 스릴러</text>
  </g>
  <g transform="translate(660, 415)">
    <!-- Tag 3 -->
    <rect width="140" height="36" rx="6" fill="#1b3a1b" stroke="#d4a017" stroke-width="1.2"/>
    <text x="70" y="23" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="14" fill="#f0c040" text-anchor="middle">허영만 원작</text>
  </g>

  <!-- Bottom source line -->
  <text x="600" y="548" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="16" fill="#8fbc8f" text-anchor="middle" opacity="0.8">2006년 1편 이후 20년 — 한국 도박 범죄 프랜차이즈의 대미</text>

  <!-- Site attribution -->
  <text x="600" y="592" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="14" fill="#5a8a5a" text-anchor="middle" opacity="0.7">ambitstock.com</text>

  <!-- Decorative spade symbol center background -->
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="280" fill="#1e4a1e" text-anchor="middle" opacity="0.06">♠</text>
</svg>
