<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="netflixGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e50914;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b71c1c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tvingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b1fa2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a148c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coupangGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e65100;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bf360c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkOverlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.55" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 3-panel background: Netflix / Tving / Coupang -->
  <rect x="0" y="0" width="400" height="630" fill="url(#netflixGrad)"/>
  <rect x="400" y="0" width="400" height="630" fill="url(#tvingGrad)"/>
  <rect x="800" y="0" width="400" height="630" fill="url(#coupangGrad)"/>

  <!-- Dark overlay for text readability -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#darkOverlay)"/>

  <!-- Divider lines -->
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

  <!-- Panel labels: small platform names at top -->
  <text x="200" y="90" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,0.75)" text-anchor="middle" letter-spacing="2">NETFLIX</text>
  <text x="600" y="90" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,0.75)" text-anchor="middle" letter-spacing="2">TVING</text>
  <text x="1000" y="90" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,0.75)" text-anchor="middle" letter-spacing="2">COUPANG PLAY</text>

  <!-- MAU numbers in each panel -->
  <text x="200" y="165" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="36" font-weight="900" fill="#FFD700" text-anchor="middle" filter="url(#shadow)">1,490만</text>
  <text x="600" y="165" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="36" font-weight="900" fill="#CE93D8" text-anchor="middle" filter="url(#shadow)">552만</text>
  <text x="1000" y="165" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="36" font-weight="900" fill="#FFAB91" text-anchor="middle" filter="url(#shadow)">879만</text>
  <text x="200" y="195" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">2026년 2월 MAU</text>
  <text x="600" y="195" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">2026년 2월 MAU</text>
  <text x="1000" y="195" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">2026년 2월 MAU</text>

  <!-- VS symbols -->
  <circle cx="400" cy="315" r="28" fill="rgba(0,0,0,0.6)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <text x="400" y="323" font-family="Arial, sans-serif" font-size="20" font-weight="900" fill="#fff" text-anchor="middle">VS</text>
  <circle cx="800" cy="315" r="28" fill="rgba(0,0,0,0.6)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <text x="800" y="323" font-family="Arial, sans-serif" font-size="20" font-weight="900" fill="#fff" text-anchor="middle">VS</text>

  <!-- Main title centered across all panels -->
  <text x="600" y="390" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="54" font-weight="900" fill="#ffffff" text-anchor="middle" filter="url(#shadow)">넷플릭스 vs 티빙 vs 쿠팡</text>
  <text x="600" y="460" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="800" fill="#FFD700" text-anchor="middle" filter="url(#shadow)">2026 OTT 비교 총정리</text>

  <!-- Badge -->
  <rect x="460" y="495" width="280" height="50" rx="25" fill="rgba(0,0,0,0.7)" stroke="rgba(255,215,0,0.8)" stroke-width="2"/>
  <text x="600" y="527" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="22" font-weight="700" fill="#FFD700" text-anchor="middle" letter-spacing="1">OTT 비교</text>

  <!-- Key features per panel at bottom -->
  <text x="200" y="578" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="15" fill="rgba(255,255,255,0.8)" text-anchor="middle">해외 드라마 · K-오리지널</text>
  <text x="600" y="578" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="15" fill="rgba(255,255,255,0.8)" text-anchor="middle">tvN 독점 · KBO · WBC</text>
  <text x="1000" y="578" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="15" fill="rgba(255,255,255,0.8)" text-anchor="middle">와우멤버십 · 스포츠 중계</text>
</svg>
