<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0000"/>
      <stop offset="50%" style="stop-color:#3d0000"/>
      <stop offset="100%" style="stop-color:#5c0000"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e53935"/>
      <stop offset="100%" style="stop-color:#ef5350"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#e53935;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#e53935;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#spot)"/>
  <!-- Global dots scatter pattern - representing worldwide reaction -->
  <circle cx="140" cy="80" r="3" fill="#ef5350" opacity="0.35"/>
  <circle cx="220" cy="50" r="2" fill="#ef5350" opacity="0.25"/>
  <circle cx="300" cy="90" r="4" fill="#ef5350" opacity="0.3"/>
  <circle cx="400" cy="60" r="2.5" fill="#ef5350" opacity="0.2"/>
  <circle cx="480" cy="40" r="3" fill="#ef5350" opacity="0.3"/>
  <circle cx="580" cy="70" r="2" fill="#ef5350" opacity="0.25"/>
  <circle cx="680" cy="45" r="3.5" fill="#ef5350" opacity="0.3"/>
  <circle cx="760" cy="80" r="2" fill="#ef5350" opacity="0.2"/>
  <circle cx="860" cy="55" r="4" fill="#ef5350" opacity="0.25"/>
  <circle cx="940" cy="35" r="2.5" fill="#ef5350" opacity="0.3"/>
  <!-- Connection lines between dots -->
  <line x1="140" y1="80" x2="300" y2="90" stroke="#e53935" stroke-width="0.8" opacity="0.15"/>
  <line x1="300" y1="90" x2="480" y2="40" stroke="#e53935" stroke-width="0.8" opacity="0.12"/>
  <line x1="480" y1="40" x2="680" y2="45" stroke="#e53935" stroke-width="0.8" opacity="0.15"/>
  <line x1="680" y1="45" x2="860" y2="55" stroke="#e53935" stroke-width="0.8" opacity="0.12"/>
  <!-- More scattered dots bottom area -->
  <circle cx="160" cy="560" r="2.5" fill="#ef5350" opacity="0.2"/>
  <circle cx="350" cy="580" r="3" fill="#ef5350" opacity="0.15"/>
  <circle cx="700" cy="555" r="2" fill="#ef5350" opacity="0.2"/>
  <circle cx="950" cy="575" r="3.5" fill="#ef5350" opacity="0.15"/>
  <!-- Diagonal slashes - action feel -->
  <line x1="900" y1="0" x2="1050" y2="630" stroke="#e53935" stroke-width="2" opacity="0.1"/>
  <line x1="950" y1="0" x2="1100" y2="630" stroke="#e53935" stroke-width="1.5" opacity="0.07"/>
  <line x1="850" y1="0" x2="1000" y2="630" stroke="#e53935" stroke-width="1" opacity="0.06"/>
  <!-- Globe outline watermark -->
  <circle cx="980" cy="315" r="200" fill="none" stroke="#e53935" stroke-width="1.5" opacity="0.08"/>
  <ellipse cx="980" cy="315" rx="100" ry="200" fill="none" stroke="#e53935" stroke-width="1" opacity="0.07"/>
  <line x1="780" y1="315" x2="1180" y2="315" stroke="#e53935" stroke-width="1" opacity="0.07"/>
  <!-- Left accent bar -->
  <rect x="80" y="165" width="7" height="300" fill="url(#acc)" rx="3.5"/>
  <!-- Category badge -->
  <rect x="106" y="165" width="120" height="38" rx="19" fill="#e53935" opacity="0.95"/>
  <text x="166" y="189" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">해외반응</text>
  <!-- Global badge -->
  <rect x="240" y="165" width="160" height="38" rx="19" fill="#ffffff" opacity="0.1"/>
  <text x="320" y="189" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#ffcdd2" text-anchor="middle">글로벌 반응</text>
  <!-- Main title line 1 -->
  <text x="106" y="300" font-family="Arial Black, Arial, sans-serif" font-size="84" font-weight="900" fill="white" letter-spacing="-2">오징어게임</text>
  <!-- Main title line 2 -->
  <text x="106" y="388" font-family="Arial Black, Arial, sans-serif" font-size="80" font-weight="900" fill="url(#acc)" letter-spacing="-2">시즌3 해외 반응</text>
  <!-- Subtitle -->
  <text x="106" y="443" font-family="Arial, sans-serif" font-size="25" font-weight="400" fill="#ffcdd2" opacity="0.88">글로벌 반응 총정리 · 외국인들의 평가</text>
  <!-- Divider -->
  <rect x="106" y="466" width="340" height="3" fill="url(#acc)" rx="1.5" opacity="0.5"/>
  <!-- Bottom bar -->
  <rect x="0" y="572" width="1200" height="58" fill="#e53935" opacity="0.12"/>
  <text x="600" y="609" font-family="Arial, sans-serif" font-size="19" fill="#ffcdd2" text-anchor="middle" opacity="0.88">ambitstock.com | R의 필름공장</text>
</svg>
