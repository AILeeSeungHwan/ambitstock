<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b4b;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#1a1a6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a0080;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe082;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#1a73e8;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Stars scattered -->
  <circle cx="100" cy="80" r="2" fill="#ffffff" opacity="0.8" />
  <circle cx="250" cy="40" r="1.5" fill="#ffffff" opacity="0.6" />
  <circle cx="400" cy="100" r="2.5" fill="#ffe082" opacity="0.7" />
  <circle cx="550" cy="30" r="1.5" fill="#ffffff" opacity="0.5" />
  <circle cx="700" cy="70" r="2" fill="#ffffff" opacity="0.8" />
  <circle cx="850" cy="50" r="1.5" fill="#ffe082" opacity="0.6" />
  <circle cx="1000" cy="90" r="2" fill="#ffffff" opacity="0.7" />
  <circle cx="1100" cy="40" r="1.5" fill="#ffffff" opacity="0.5" />
  <circle cx="150" cy="580" r="2" fill="#ffffff" opacity="0.6" />
  <circle cx="350" cy="550" r="1.5" fill="#ffe082" opacity="0.7" />
  <circle cx="800" cy="600" r="2" fill="#ffffff" opacity="0.5" />
  <circle cx="1050" cy="580" r="1.5" fill="#ffffff" opacity="0.8" />
  <circle cx="50" cy="300" r="1.5" fill="#ffffff" opacity="0.4" />
  <circle cx="1150" cy="350" r="2" fill="#ffe082" opacity="0.5" />

  <!-- Glow circles in background -->
  <circle cx="900" cy="320" r="280" fill="url(#glow)" />
  <circle cx="920" cy="310" r="200" fill="none" stroke="#1a73e8" stroke-width="1" stroke-opacity="0.3" />
  <circle cx="920" cy="310" r="150" fill="none" stroke="#7b1fa2" stroke-width="1" stroke-opacity="0.2" />

  <!-- Planet shapes -->
  <circle cx="950" cy="300" r="130" fill="#1a1a6e" fill-opacity="0.7" stroke="#1a73e8" stroke-width="2" stroke-opacity="0.5" />
  <ellipse cx="950" cy="300" rx="200" ry="25" fill="none" stroke="#1a73e8" stroke-width="2" stroke-opacity="0.4" transform="rotate(-15, 950, 300)" />

  <!-- Left accent bar -->
  <rect x="80" y="180" width="6" height="280" fill="#1a73e8" rx="3" />

  <!-- Category badge -->
  <rect x="80" y="120" width="160" height="40" fill="#00897b" rx="4" />
  <text x="160" y="147" font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">애니메이션</text>

  <!-- Main title line 1 -->
  <text x="110" y="250" font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif" font-size="78" font-weight="900" fill="#ffffff" letter-spacing="-2">슈퍼마리오</text>

  <!-- Main title line 2 -->
  <text x="110" y="340" font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif" font-size="78" font-weight="900" fill="#ffe082" letter-spacing="-2">갤럭시 무비</text>

  <!-- Subtitle -->
  <text x="110" y="400" font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif" font-size="26" font-weight="400" fill="#90caf9" letter-spacing="2">마리오가 우주로 간다</text>

  <!-- Divider -->
  <rect x="110" y="420" width="480" height="2" fill="#1a73e8" opacity="0.7" />

  <!-- Production info -->
  <text x="110" y="458" font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif" font-size="22" font-weight="700" fill="#ffe082">닌텐도 × 일루미네이션 2026</text>

  <!-- Cast info -->
  <text x="110" y="495" font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif" font-size="18" font-weight="400" fill="#bbdefb">크리스 프랫 · 안야 테일러조이 · 잭 블랙 · 브리 라슨</text>

  <!-- Release badge -->
  <rect x="110" y="520" width="340" height="48" fill="#1a73e8" fill-opacity="0.8" rx="6" />
  <text x="280" y="551" font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">한국 개봉 2026년 4월 29일</text>

  <!-- Site URL -->
  <text x="110" y="600" font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif" font-size="18" fill="#666699">ambitstock.com</text>

  <!-- Star decorations on right -->
  <text x="940" y="320" font-family="serif" font-size="60" fill="url(#star)" text-anchor="middle" opacity="0.9">★</text>
  <text x="870" y="260" font-family="serif" font-size="30" fill="#ffffff" text-anchor="middle" opacity="0.6">✦</text>
  <text x="1010" y="260" font-family="serif" font-size="24" fill="#ffe082" text-anchor="middle" opacity="0.7">✦</text>
  <text x="870" y="380" font-family="serif" font-size="24" fill="#ffe082" text-anchor="middle" opacity="0.6">✦</text>
  <text x="1010" y="380" font-family="serif" font-size="30" fill="#ffffff" text-anchor="middle" opacity="0.7">✦</text>
</svg>
