<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
    <linearGradient id="accentH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
    <linearGradient id="moonGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#e8f4ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1a73e8" stop-opacity="0.0"/>
    </linearGradient>
    <radialGradient id="moonRad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#93c5fd" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a73e8" stop-opacity="0.0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Night sky stars (small dots) -->
  <circle cx="750" cy="90" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="810" cy="60" r="1" fill="white" opacity="0.6"/>
  <circle cx="870" cy="110" r="2" fill="white" opacity="0.5"/>
  <circle cx="930" cy="70" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="980" cy="130" r="1" fill="white" opacity="0.5"/>
  <circle cx="1040" cy="85" r="2" fill="white" opacity="0.6"/>
  <circle cx="1090" cy="55" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="1140" cy="110" r="1" fill="white" opacity="0.7"/>
  <circle cx="690" cy="130" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="650" cy="75" r="1" fill="white" opacity="0.6"/>
  <circle cx="780" cy="150" r="1" fill="white" opacity="0.4"/>
  <circle cx="1000" cy="50" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="1160" cy="160" r="1" fill="white" opacity="0.5"/>
  <circle cx="830" cy="180" r="1" fill="white" opacity="0.4"/>
  <circle cx="900" cy="165" r="1.5" fill="white" opacity="0.5"/>
  <!-- Moon glow halo -->
  <circle cx="1050" cy="200" r="130" fill="#1a73e8" opacity="0.08"/>
  <circle cx="1050" cy="200" r="90" fill="#42a5f5" opacity="0.08"/>
  <!-- Moon crescent -->
  <circle cx="1050" cy="200" r="68" fill="#dbeafe" opacity="0.88"/>
  <circle cx="1085" cy="185" r="58" fill="#0f2244" opacity="1"/>
  <!-- Moon surface craters -->
  <circle cx="1020" cy="215" r="7" fill="none" stroke="#93c5fd" stroke-width="1.5" opacity="0.4"/>
  <circle cx="1032" cy="185" r="4" fill="none" stroke="#93c5fd" stroke-width="1" opacity="0.35"/>
  <!-- Subtle cloud shapes bottom right -->
  <ellipse cx="1100" cy="470" rx="90" ry="30" fill="#1a73e8" opacity="0.06"/>
  <ellipse cx="1050" cy="460" rx="70" ry="22" fill="#42a5f5" opacity="0.05"/>
  <!-- Left accent bar -->
  <rect x="78" y="155" width="7" height="305" fill="url(#accent)" rx="3"/>
  <!-- Category badge -->
  <rect x="108" y="155" width="176" height="38" rx="19" fill="#1a73e8"/>
  <text x="196" y="180" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">영화추천</text>
  <!-- Night badge -->
  <rect x="300" y="155" width="130" height="38" rx="19" fill="none" stroke="#42a5f5" stroke-width="2" opacity="0.6"/>
  <text x="365" y="180" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="17" font-weight="600" fill="#93c5fd" text-anchor="middle" opacity="0.85">혼자 보기</text>
  <!-- Main title -->
  <text x="108" y="290" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="88" font-weight="900" fill="white">혼자 볼 영화</text>
  <text x="108" y="388" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="88" font-weight="900" fill="url(#accentH)">추천 가이드</text>
  <!-- Subtitle -->
  <text x="108" y="445" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="28" fill="#7ab8f5" opacity="0.85">상황별 몰입작 — 밤에 혼자 보기 딱 좋은</text>
  <!-- Dotted line decoration -->
  <line x1="108" y1="468" x2="660" y2="468" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="6,6" opacity="0.3"/>
  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#000" opacity="0.2"/>
  <text x="600" y="608" font-family="'Apple SD Gothic Neo',sans-serif" font-size="20" fill="white" opacity="0.45" text-anchor="middle">ambitstock.com | R의 필름공장</text>
</svg>
