<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#2d1b69;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006d77;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Circuit board decorations - horizontal lines -->
  <line x1="700" y1="60" x2="1180" y2="60" stroke="rgba(168,85,247,0.15)" stroke-width="1.5" />
  <line x1="750" y1="120" x2="1180" y2="120" stroke="rgba(6,182,212,0.12)" stroke-width="1" />
  <line x1="680" y1="180" x2="1180" y2="180" stroke="rgba(168,85,247,0.10)" stroke-width="1" />
  <line x1="720" y1="420" x2="1180" y2="420" stroke="rgba(6,182,212,0.12)" stroke-width="1" />
  <line x1="700" y1="480" x2="1180" y2="480" stroke="rgba(168,85,247,0.10)" stroke-width="1" />
  <line x1="740" y1="540" x2="1180" y2="540" stroke="rgba(6,182,212,0.08)" stroke-width="1" />
  <!-- Circuit board decorations - vertical lines -->
  <line x1="800" y1="40" x2="800" y2="200" stroke="rgba(168,85,247,0.12)" stroke-width="1" />
  <line x1="950" y1="40" x2="950" y2="150" stroke="rgba(6,182,212,0.10)" stroke-width="1" />
  <line x1="1100" y1="40" x2="1100" y2="250" stroke="rgba(168,85,247,0.10)" stroke-width="1" />
  <line x1="820" y1="400" x2="820" y2="600" stroke="rgba(6,182,212,0.10)" stroke-width="1" />
  <line x1="1020" y1="380" x2="1020" y2="590" stroke="rgba(168,85,247,0.08)" stroke-width="1" />
  <!-- Circuit nodes -->
  <circle cx="800" cy="60" r="5" fill="rgba(168,85,247,0.35)" />
  <circle cx="950" cy="120" r="4" fill="rgba(6,182,212,0.30)" />
  <circle cx="1100" cy="60" r="5" fill="rgba(168,85,247,0.25)" />
  <circle cx="1100" cy="180" r="3.5" fill="rgba(6,182,212,0.25)" />
  <circle cx="820" cy="420" r="4" fill="rgba(168,85,247,0.30)" />
  <circle cx="1020" cy="480" r="5" fill="rgba(6,182,212,0.25)" />
  <!-- Large decorative circles -->
  <circle cx="1080" cy="320" r="260" fill="rgba(168,85,247,0.05)" />
  <circle cx="1080" cy="320" r="180" fill="rgba(6,182,212,0.04)" />
  <circle cx="50" cy="550" r="200" fill="rgba(109,40,217,0.07)" />
  <!-- AI neural network nodes decoration -->
  <circle cx="920" cy="250" r="8" fill="none" stroke="rgba(168,85,247,0.40)" stroke-width="1.5" />
  <circle cx="980" cy="310" r="6" fill="none" stroke="rgba(6,182,212,0.35)" stroke-width="1.5" />
  <circle cx="1060" cy="260" r="10" fill="none" stroke="rgba(168,85,247,0.30)" stroke-width="1.5" />
  <circle cx="1130" cy="330" r="7" fill="none" stroke="rgba(6,182,212,0.25)" stroke-width="1.5" />
  <line x1="920" y1="250" x2="980" y2="310" stroke="rgba(168,85,247,0.20)" stroke-width="1" />
  <line x1="980" y1="310" x2="1060" y2="260" stroke="rgba(6,182,212,0.18)" stroke-width="1" />
  <line x1="1060" y1="260" x2="1130" y2="330" stroke="rgba(168,85,247,0.15)" stroke-width="1" />
  <line x1="920" y1="250" x2="1060" y2="260" stroke="rgba(6,182,212,0.12)" stroke-width="1" />
  <!-- Badge -->
  <rect x="80" y="76" width="160" height="44" rx="22" fill="url(#badge)" />
  <text x="160" y="104" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">테크 트렌드</text>
  <rect x="256" y="76" width="100" height="44" rx="22" fill="rgba(255,255,255,0.12)" />
  <text x="306" y="104" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="20" font-weight="700" fill="#06b6d4" text-anchor="middle">2026</text>
  <!-- Main title line 1 - large accent -->
  <text x="80" y="230" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="100" font-weight="900" fill="url(#accent)" letter-spacing="-3">AI × 영화</text>
  <!-- Main title line 2 -->
  <text x="80" y="330" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="70" font-weight="900" fill="white" letter-spacing="-2">2026 트렌드</text>
  <!-- Divider -->
  <rect x="80" y="358" width="580" height="4" rx="2" fill="url(#accent)" />
  <!-- Subtitle -->
  <text x="80" y="412" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="400" fill="rgba(255,255,255,0.88)">VFX · 디에이징 · AI 추천 · 숏폼의 미래</text>
  <!-- Highlight box -->
  <rect x="80" y="462" width="580" height="58" rx="10" fill="rgba(0,0,0,0.40)" />
  <rect x="80" y="462" width="5" height="58" rx="2" fill="url(#accent)" />
  <text x="100" y="499" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="22" fill="rgba(255,255,255,0.85)">영화 제작 방식이 완전히 달라지고 있다</text>
  <!-- Site label -->
  <text x="1120" y="600" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="20" fill="rgba(255,255,255,0.35)" text-anchor="end">ambitstock.com</text>
</svg>
