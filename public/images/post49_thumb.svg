<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg49" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#3d0000"/>
    </linearGradient>
    <linearGradient id="accent49" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e53935"/>
      <stop offset="100%" stop-color="#ef5350"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg49)"/>
  <!-- Broadcast / signal bars decorative motif (right side) -->
  <rect x="880" y="220" width="18" height="190" rx="9" fill="#e53935" fill-opacity="0.25"/>
  <rect x="916" y="185" width="18" height="225" rx="9" fill="#e53935" fill-opacity="0.20"/>
  <rect x="952" y="155" width="18" height="255" rx="9" fill="#e53935" fill-opacity="0.16"/>
  <rect x="988" y="130" width="18" height="280" rx="9" fill="#e53935" fill-opacity="0.13"/>
  <rect x="1024" y="110" width="18" height="300" rx="9" fill="#e53935" fill-opacity="0.10"/>
  <rect x="1060" y="95" width="18" height="315" rx="9" fill="#e53935" fill-opacity="0.08"/>
  <rect x="1096" y="84" width="18" height="326" rx="9" fill="#e53935" fill-opacity="0.06"/>
  <rect x="1132" y="76" width="18" height="334" rx="9" fill="#e53935" fill-opacity="0.05"/>
  <!-- Concentric arcs (broadcast waves) -->
  <path d="M840,315 Q840,200 920,120" fill="none" stroke="#e53935" stroke-width="2" stroke-opacity="0.2" stroke-linecap="round"/>
  <path d="M840,315 Q840,160 970,60" fill="none" stroke="#e53935" stroke-width="1.5" stroke-opacity="0.15" stroke-linecap="round"/>
  <path d="M840,315 Q840,120 1020,10" fill="none" stroke="#e53935" stroke-width="1" stroke-opacity="0.10" stroke-linecap="round"/>
  <!-- Accent bar -->
  <rect x="80" y="175" width="6" height="280" fill="url(#accent49)" rx="3"/>
  <!-- Badge -->
  <rect x="110" y="175" width="210" height="38" rx="19" fill="#e53935"/>
  <text x="215" y="194" font-family="'Segoe UI','Malgun Gothic',Arial,sans-serif" font-size="17" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="middle">해외반응후기</text>
  <!-- Titles -->
  <text x="110" y="308" font-family="'Segoe UI','Malgun Gothic',Arial,sans-serif" font-size="84" font-weight="900" fill="white" letter-spacing="-2">한국 예능</text>
  <text x="110" y="405" font-family="'Segoe UI','Malgun Gothic',Arial,sans-serif" font-size="84" font-weight="900" fill="url(#accent49)" letter-spacing="-2">해외 반응</text>
  <!-- Subtitle -->
  <text x="110" y="462" font-family="'Segoe UI','Malgun Gothic',Arial,sans-serif" font-size="25" fill="#ef9a9a" letter-spacing="0.5">런닝맨부터 나혼산까지 — 외국인도 빠져든 이유</text>
  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#000" fill-opacity="0.35"/>
  <rect x="0" y="570" width="1200" height="3" fill="url(#accent49)"/>
  <text x="600" y="603" font-family="'Segoe UI',Arial,sans-serif" font-size="19" fill="white" fill-opacity="0.65" text-anchor="middle" dominant-baseline="middle" letter-spacing="3">ambitstock.com | R의 필름공장</text>
</svg>
