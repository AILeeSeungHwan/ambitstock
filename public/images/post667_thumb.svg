<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a006f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6a1b9a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0040;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ce93d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#80cbc4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#7b1fa2" opacity="0.2" />
  <circle cx="1100" cy="530" r="180" fill="#4a0080" opacity="0.3" />
  <circle cx="600" cy="315" r="350" fill="#9c27b0" opacity="0.05" />
  <!-- Top label -->
  <rect x="60" y="55" width="220" height="44" rx="22" fill="#ce93d8" opacity="0.25" />
  <text x="170" y="83" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="20" font-weight="700" fill="#e1bee7" text-anchor="middle">드라마 작가 가이드</text>
  <!-- Main title line 1 -->
  <text x="600" y="240" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="68" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-1">박해영 작가</text>
  <!-- Accent line -->
  <rect x="200" y="265" width="800" height="4" fill="url(#accent)" rx="2" />
  <!-- Main title line 2 -->
  <text x="600" y="340" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="46" font-weight="700" fill="#e1bee7" text-anchor="middle">드라마 완전 정복</text>
  <!-- Subtitle -->
  <text x="600" y="415" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="28" fill="#ce93d8" text-anchor="middle">또오해영 · 나의아저씨 · 나의해방일지 → 모자무싸</text>
  <!-- Bottom info -->
  <text x="600" y="490" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="22" fill="#b39ddb" text-anchor="middle">4월 18일 첫방 전 필독 — 세계관이 반복해서 성공하는 이유</text>
  <!-- Bottom brand -->
  <text x="600" y="570" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="18" fill="#9575cd" text-anchor="middle" opacity="0.8">ambitstock.com · R의 필름공장</text>
</svg>
