<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#100010"/>
      <stop offset="50%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a94e"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.75"/>
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Horizontal bar chart right side - ratings visualization -->
  <!-- Rank bars -->
  <text x="870" y="100" font-family="Arial, sans-serif" font-size="13" fill="#ffd700" opacity="0.55" text-anchor="end">#1</text>
  <rect x="880" y="82" width="260" height="22" rx="11" fill="url(#bar1)"/>
  <text x="1148" y="98" font-family="Arial, sans-serif" font-size="12" fill="#ffd700" opacity="0.7">9.0</text>
  <text x="870" y="145" font-family="Arial, sans-serif" font-size="13" fill="#ffd700" opacity="0.5" text-anchor="end">#2</text>
  <rect x="880" y="127" width="240" height="22" rx="11" fill="url(#bar2)"/>
  <text x="1128" y="143" font-family="Arial, sans-serif" font-size="12" fill="#ffd700" opacity="0.65">8.9</text>
  <text x="870" y="190" font-family="Arial, sans-serif" font-size="13" fill="#ffd700" opacity="0.45" text-anchor="end">#3</text>
  <rect x="880" y="172" width="225" height="22" rx="11" fill="#ffd700" opacity="0.18"/>
  <text x="1113" y="188" font-family="Arial, sans-serif" font-size="12" fill="#ffd700" opacity="0.6">8.8</text>
  <text x="870" y="235" font-family="Arial, sans-serif" font-size="13" fill="#ffd700" opacity="0.4" text-anchor="end">#4</text>
  <rect x="880" y="217" width="210" height="22" rx="11" fill="#ffd700" opacity="0.14"/>
  <text x="870" y="280" font-family="Arial, sans-serif" font-size="13" fill="#ffd700" opacity="0.35" text-anchor="end">#5</text>
  <rect x="880" y="262" width="195" height="22" rx="11" fill="#ffd700" opacity="0.11"/>
  <text x="870" y="325" font-family="Arial, sans-serif" font-size="13" fill="#ffd700" opacity="0.3" text-anchor="end">#6</text>
  <rect x="880" y="307" width="178" height="22" rx="11" fill="#ffd700" opacity="0.09"/>
  <text x="870" y="370" font-family="Arial, sans-serif" font-size="13" fill="#ffd700" opacity="0.25" text-anchor="end">#7</text>
  <rect x="880" y="352" width="160" height="22" rx="11" fill="#ffd700" opacity="0.07"/>
  <text x="870" y="415" font-family="Arial, sans-serif" font-size="13" fill="#ffd700" opacity="0.2" text-anchor="end">#8</text>
  <rect x="880" y="397" width="140" height="22" rx="11" fill="#ffd700" opacity="0.06"/>
  <!-- Separator line -->
  <line x1="858" y1="60" x2="858" y2="540" stroke="#c9a94e" stroke-width="1" opacity="0.15"/>
  <!-- Star rating icon top left area -->
  <text x="200" y="80" font-family="Arial, sans-serif" font-size="32" fill="#ffd700" opacity="0.2">★★★★★</text>
  <!-- Rotten tomato score watermark -->
  <text x="520" y="120" font-family="Arial Black, Arial, sans-serif" font-size="90" font-weight="900" fill="#ffd700" opacity="0.04">RT</text>
  <!-- Star field -->
  <circle cx="120" cy="40" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="280" cy="55" r="1" fill="#ffd700" opacity="0.35"/>
  <circle cx="430" cy="35" r="1.5" fill="white" opacity="0.25"/>
  <circle cx="600" cy="50" r="1" fill="white" opacity="0.3"/>
  <circle cx="750" cy="30" r="2" fill="#ffd700" opacity="0.3"/>
  <!-- Left accent bar -->
  <rect x="80" y="155" width="7" height="310" fill="url(#gold)" rx="3.5"/>
  <!-- Category badge -->
  <rect x="106" y="155" width="100" height="38" rx="19" fill="#1a1a2e" stroke="#c9a94e" stroke-width="1.5" opacity="0.95"/>
  <text x="156" y="179" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffd700" text-anchor="middle">마블</text>
  <!-- Rating badge -->
  <rect x="220" y="155" width="160" height="38" rx="19" fill="#ffd700" opacity="0.12"/>
  <text x="300" y="179" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffd700" text-anchor="middle" opacity="0.85">★ 평점순 랭킹</text>
  <!-- Main title line 1 -->
  <text x="106" y="290" font-family="Arial Black, Arial, sans-serif" font-size="82" font-weight="900" fill="white" letter-spacing="-2">마블 영화</text>
  <!-- Main title line 2 -->
  <text x="106" y="378" font-family="Arial Black, Arial, sans-serif" font-size="80" font-weight="900" fill="url(#gold)" letter-spacing="-2">평점순 TOP 20</text>
  <!-- Subtitle -->
  <text x="106" y="434" font-family="Arial, sans-serif" font-size="25" font-weight="400" fill="#f5deb3" opacity="0.85">역대 최고작 랭킹 · 로튼토마토 · IMDB</text>
  <!-- Divider -->
  <rect x="106" y="457" width="330" height="3" fill="url(#gold)" rx="1.5" opacity="0.5"/>
  <!-- Bottom bar -->
  <rect x="0" y="572" width="1200" height="58" fill="#c9a94e" opacity="0.1"/>
  <text x="600" y="609" font-family="Arial, sans-serif" font-size="19" fill="#f5deb3" text-anchor="middle" opacity="0.85">ambitstock.com | R의 필름공장</text>
</svg>
