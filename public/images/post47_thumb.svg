<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg47" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#3d0000"/>
    </linearGradient>
    <linearGradient id="accent47" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e53935"/>
      <stop offset="100%" stop-color="#ef5350"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg47)"/>
  <!-- Globe circles (global reach motif) -->
  <circle cx="960" cy="315" r="250" fill="none" stroke="#e53935" stroke-width="1.5" stroke-opacity="0.15"/>
  <circle cx="960" cy="315" r="185" fill="none" stroke="#e53935" stroke-width="1" stroke-opacity="0.11"/>
  <circle cx="960" cy="315" r="120" fill="none" stroke="#e53935" stroke-width="1" stroke-opacity="0.09"/>
  <!-- Globe latitude lines -->
  <ellipse cx="960" cy="315" rx="250" ry="85" fill="none" stroke="#e53935" stroke-width="1" stroke-opacity="0.11"/>
  <ellipse cx="960" cy="315" rx="250" ry="168" fill="none" stroke="#e53935" stroke-width="1" stroke-opacity="0.09"/>
  <!-- Globe meridians -->
  <line x1="960" y1="65" x2="960" y2="565" stroke="#e53935" stroke-width="1" stroke-opacity="0.11"/>
  <line x1="727" y1="82" x2="1193" y2="548" stroke="#e53935" stroke-width="1" stroke-opacity="0.07"/>
  <line x1="1193" y1="82" x2="727" y2="548" stroke="#e53935" stroke-width="1" stroke-opacity="0.07"/>
  <!-- Globe soft fill -->
  <circle cx="960" cy="315" r="250" fill="#e53935" fill-opacity="0.04"/>
  <!-- Constellation dots -->
  <circle cx="855" cy="155" r="3" fill="#ef5350" fill-opacity="0.55"/>
  <circle cx="893" cy="125" r="2" fill="#ef5350" fill-opacity="0.45"/>
  <circle cx="928" cy="165" r="4" fill="#e53935" fill-opacity="0.4"/>
  <circle cx="875" cy="198" r="2" fill="#ef5350" fill-opacity="0.5"/>
  <line x1="855" y1="155" x2="893" y2="125" stroke="#e53935" stroke-width="0.8" stroke-opacity="0.28"/>
  <line x1="893" y1="125" x2="928" y2="165" stroke="#e53935" stroke-width="0.8" stroke-opacity="0.28"/>
  <line x1="855" y1="155" x2="875" y2="198" stroke="#e53935" stroke-width="0.8" stroke-opacity="0.28"/>
  <!-- Left accent bar -->
  <rect x="80" y="175" width="6" height="280" fill="url(#accent47)" rx="3"/>
  <!-- Category badge -->
  <rect x="110" y="175" width="210" height="38" rx="19" fill="#e53935"/>
  <text x="215" y="194" font-family="'Segoe UI','Malgun Gothic',Arial,sans-serif" font-size="17" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="middle">해외반응후기</text>
  <!-- Main title -->
  <text x="110" y="308" font-family="'Segoe UI','Malgun Gothic',Arial,sans-serif" font-size="84" font-weight="900" fill="white" letter-spacing="-2">한국 영화</text>
  <text x="110" y="405" font-family="'Segoe UI','Malgun Gothic',Arial,sans-serif" font-size="84" font-weight="900" fill="url(#accent47)" letter-spacing="-2">해외 반응</text>
  <!-- Subtitle -->
  <text x="110" y="462" font-family="'Segoe UI','Malgun Gothic',Arial,sans-serif" font-size="25" fill="#ef9a9a" letter-spacing="0.5">올드보이부터 기생충까지 — 세계를 사로잡은 이유</text>
  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#000" fill-opacity="0.35"/>
  <rect x="0" y="570" width="1200" height="3" fill="url(#accent47)"/>
  <text x="600" y="603" font-family="'Segoe UI',Arial,sans-serif" font-size="19" fill="white" fill-opacity="0.65" text-anchor="middle" dominant-baseline="middle" letter-spacing="3">ambitstock.com | R의 필름공장</text>
</svg>
