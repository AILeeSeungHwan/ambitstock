<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
    <linearGradient id="warmSun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="accentH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Sun decoration top right -->
  <circle cx="1080" cy="150" r="200" fill="url(#sunGlow)"/>
  <circle cx="1080" cy="150" r="70" fill="#fbbf24" opacity="0.18"/>
  <circle cx="1080" cy="150" r="50" fill="#fbbf24" opacity="0.22"/>
  <!-- Sun rays -->
  <line x1="1080" y1="60" x2="1080" y2="30" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <line x1="1140" y1="90" x2="1160" y2="70" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <line x1="1165" y1="150" x2="1195" y2="150" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <line x1="1140" y1="210" x2="1160" y2="230" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <line x1="1020" y1="90" x2="1000" y2="70" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <line x1="995" y1="150" x2="965" y2="150" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <line x1="1020" y1="210" x2="1000" y2="230" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <!-- Warm rolling hills bottom right -->
  <ellipse cx="1100" cy="520" rx="220" ry="80" fill="#f97316" opacity="0.07"/>
  <ellipse cx="950" cy="540" rx="180" ry="60" fill="#fbbf24" opacity="0.05"/>
  <!-- Small figures (family silhouette suggestion) -->
  <rect x="940" y="380" width="18" height="55" rx="9" fill="#fbbf24" opacity="0.12"/>
  <circle cx="949" cy="368" r="12" fill="#fbbf24" opacity="0.12"/>
  <rect x="975" y="395" width="14" height="42" rx="7" fill="#fbbf24" opacity="0.10"/>
  <circle cx="982" cy="385" r="10" fill="#fbbf24" opacity="0.10"/>
  <rect x="1005" y="410" width="10" height="30" rx="5" fill="#fbbf24" opacity="0.08"/>
  <circle cx="1010" cy="402" r="8" fill="#fbbf24" opacity="0.08"/>
  <!-- Left accent bar -->
  <rect x="78" y="155" width="7" height="305" fill="url(#accent)" rx="3"/>
  <!-- Category badge -->
  <rect x="108" y="155" width="176" height="38" rx="19" fill="#1a73e8"/>
  <text x="196" y="180" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">영화추천</text>
  <!-- Family badge -->
  <rect x="300" y="155" width="144" height="38" rx="19" fill="#fbbf24" opacity="0.2"/>
  <text x="372" y="180" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="17" font-weight="600" fill="#fbbf24" text-anchor="middle">가족영화</text>
  <!-- Main title -->
  <text x="108" y="290" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="88" font-weight="900" fill="white">가족 영화</text>
  <text x="108" y="388" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="88" font-weight="900" fill="url(#accentH)">TOP 10</text>
  <!-- Subtitle -->
  <text x="108" y="445" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="28" fill="#7ab8f5" opacity="0.85">아이와 함께 — 온 가족이 즐기는</text>
  <!-- Warm underline -->
  <rect x="108" y="468" width="540" height="3" rx="1.5" fill="url(#warmSun)" opacity="0.5"/>
  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#000" opacity="0.2"/>
  <text x="600" y="608" font-family="'Apple SD Gothic Neo',sans-serif" font-size="20" fill="white" opacity="0.45" text-anchor="middle">ambitstock.com | R의 필름공장</text>
</svg>
