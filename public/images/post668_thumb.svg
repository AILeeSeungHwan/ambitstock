<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- 배경 장식 원 -->
  <circle cx="950" cy="100" r="200" fill="#e53935" opacity="0.12" />
  <circle cx="200" cy="500" r="150" fill="#ff6f00" opacity="0.10" />
  <!-- BEEF 타이틀 강조 -->
  <rect x="60" y="100" width="8" height="120" fill="#e53935" rx="4" />
  <!-- 카테고리 배지 -->
  <rect x="80" y="108" width="120" height="34" fill="#e53935" rx="6" />
  <text x="140" y="132" font-family="'Noto Sans KR', Arial, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">드라마 Q&amp;A</text>
  <!-- 메인 타이틀 -->
  <text x="80" y="210" font-family="'Noto Sans KR', Arial, sans-serif" font-size="62" font-weight="900" fill="white">성난사람들2</text>
  <text x="80" y="285" font-family="'Noto Sans KR', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffcdd2">Q&amp;A 해석 가이드</text>
  <!-- 부제 -->
  <text x="80" y="355" font-family="'Noto Sans KR', Arial, sans-serif" font-size="26" fill="#ffb3b3">시즌1 연결? 세대 갈등? 서울까지 가는 이유?</text>
  <text x="80" y="395" font-family="'Noto Sans KR', Arial, sans-serif" font-size="26" fill="#ffb3b3">9가지 질문 총정리</text>
  <!-- 구분선 -->
  <line x1="80" y1="430" x2="700" y2="430" stroke="#e53935" stroke-width="2" opacity="0.6" />
  <!-- 메타 정보 -->
  <text x="80" y="465" font-family="'Noto Sans KR', Arial, sans-serif" font-size="20" fill="#ef9a9a">Netflix · 8부작 · 2026.04.16 공개</text>
  <!-- 오른쪽 장식 -->
  <text x="1100" y="340" font-family="Arial, sans-serif" font-size="120" font-weight="900" fill="#e53935" opacity="0.15" text-anchor="middle">B</text>
  <text x="1100" y="450" font-family="Arial, sans-serif" font-size="120" font-weight="900" fill="#e53935" opacity="0.10" text-anchor="middle">E</text>
</svg>
