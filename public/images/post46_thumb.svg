<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
    <linearGradient id="accentH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="33%" stop-color="#7c3aed"/>
      <stop offset="66%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Weekend mood: couch / remote icons suggestion via geometric shapes -->
  <!-- Sofa shape right side -->
  <rect x="820" y="340" width="320" height="140" rx="20" fill="#1a73e8" opacity="0.09"/>
  <rect x="800" y="360" width="40" height="120" rx="12" fill="#1a73e8" opacity="0.10"/>
  <rect x="1100" y="360" width="40" height="120" rx="12" fill="#1a73e8" opacity="0.10"/>
  <rect x="810" y="300" width="340" height="60" rx="18" fill="#1a73e8" opacity="0.08"/>
  <!-- Popcorn kernels scattered -->
  <ellipse cx="920" cy="290" rx="8" ry="6" fill="#fbbf24" opacity="0.22"/>
  <ellipse cx="950" cy="275" rx="6" ry="5" fill="#fbbf24" opacity="0.18"/>
  <ellipse cx="905" cy="270" rx="7" ry="5" fill="#fbbf24" opacity="0.2"/>
  <ellipse cx="935" cy="260" rx="5" ry="4" fill="#f97316" opacity="0.18"/>
  <ellipse cx="975" cy="285" rx="7" ry="5" fill="#fbbf24" opacity="0.16"/>
  <ellipse cx="1000" cy="265" rx="5" ry="4" fill="#f97316" opacity="0.15"/>
  <!-- TV / screen shape -->
  <rect x="860" y="150" width="260" height="160" rx="12" fill="#0f172a" opacity="0.55"/>
  <rect x="875" y="163" width="230" height="134" rx="8" fill="#1a73e8" opacity="0.08"/>
  <!-- Screen glow lines -->
  <rect x="890" y="185" width="180" height="3" rx="1.5" fill="#42a5f5" opacity="0.2"/>
  <rect x="890" y="200" width="140" height="3" rx="1.5" fill="#42a5f5" opacity="0.15"/>
  <rect x="890" y="215" width="160" height="3" rx="1.5" fill="#42a5f5" opacity="0.12"/>
  <rect x="890" y="230" width="120" height="3" rx="1.5" fill="#42a5f5" opacity="0.1"/>
  <!-- TV stand -->
  <rect x="975" y="310" width="10" height="30" rx="5" fill="#1a73e8" opacity="0.15"/>
  <rect x="945" y="338" width="70" height="8" rx="4" fill="#1a73e8" opacity="0.12"/>
  <!-- Day-of-week labels -->
  <text x="820" y="510" font-family="'Apple SD Gothic Neo',sans-serif" font-size="16" font-weight="700" fill="#42a5f5" opacity="0.4" text-anchor="middle">토</text>
  <text x="870" y="510" font-family="'Apple SD Gothic Neo',sans-serif" font-size="16" font-weight="700" fill="#42a5f5" opacity="0.4" text-anchor="middle">일</text>
  <!-- Colorful category tags (weekend variety) -->
  <rect x="820" y="520" width="50" height="22" rx="11" fill="#1a73e8" opacity="0.3"/>
  <rect x="880" y="520" width="50" height="22" rx="11" fill="#7c3aed" opacity="0.3"/>
  <rect x="940" y="520" width="50" height="22" rx="11" fill="#f59e0b" opacity="0.25"/>
  <rect x="1000" y="520" width="50" height="22" rx="11" fill="#00897b" opacity="0.3"/>
  <!-- Left accent bar -->
  <rect x="78" y="155" width="7" height="305" fill="url(#accent)" rx="3"/>
  <!-- Category badge -->
  <rect x="108" y="155" width="176" height="38" rx="19" fill="#1a73e8"/>
  <text x="196" y="180" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">영화추천</text>
  <!-- Weekend badge -->
  <rect x="300" y="155" width="130" height="38" rx="19" fill="none" stroke="#42a5f5" stroke-width="2" opacity="0.65"/>
  <text x="365" y="180" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="17" font-weight="600" fill="#7ab8f5" text-anchor="middle">주말 추천</text>
  <!-- Main title -->
  <text x="108" y="290" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="88" font-weight="900" fill="white">주말 영화</text>
  <text x="108" y="388" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="88" font-weight="900" fill="url(#accentH)">상황별 추천</text>
  <!-- Subtitle -->
  <text x="108" y="445" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="28" fill="#7ab8f5" opacity="0.85">오늘 뭐 볼까?</text>
  <!-- Rainbow underline (variety) -->
  <rect x="108" y="468" width="360" height="4" rx="2" fill="url(#rainbow)" opacity="0.5"/>
  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#000" opacity="0.2"/>
  <text x="600" y="608" font-family="'Apple SD Gothic Neo',sans-serif" font-size="20" fill="white" opacity="0.45" text-anchor="middle">ambitstock.com | R의 필름공장</text>
</svg>
