<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e91e63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6090;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)" />
  <!-- 장식 원형 -->
  <circle cx="1000" cy="100" r="200" fill="#e91e63" fill-opacity="0.05" />
  <circle cx="200" cy="530" r="160" fill="#3f51b5" fill-opacity="0.08" />
  <!-- 플랫폼 배지 -->
  <rect x="80" y="80" width="180" height="40" rx="20" fill="#1565c0" />
  <text x="170" y="106" font-family="'Noto Sans KR', Arial, sans-serif" font-size="17" font-weight="700" fill="white" text-anchor="middle">Disney+ / MBC</text>
  <!-- 케미 배지 -->
  <rect x="276" y="80" width="160" height="40" rx="20" fill="url(#accent)" />
  <text x="356" y="106" font-family="'Noto Sans KR', Arial, sans-serif" font-size="17" font-weight="700" fill="white" text-anchor="middle">케미 분석</text>
  <!-- 메인 제목 -->
  <text x="80" y="195" font-family="'Noto Sans KR', Arial, sans-serif" font-size="66" font-weight="900" fill="white">21세기</text>
  <text x="80" y="278" font-family="'Noto Sans KR', Arial, sans-serif" font-size="66" font-weight="900" fill="white">대군부인</text>
  <!-- 부제 -->
  <text x="80" y="350" font-family="'Noto Sans KR', Arial, sans-serif" font-size="30" fill="#ef9a9a">아이유 × 변우석  —  달의연인 10년 후</text>
  <!-- 구분선 -->
  <rect x="80" y="385" width="640" height="2" fill="url(#accent)" fill-opacity="0.7" />
  <!-- 서브 정보 -->
  <text x="80" y="425" font-family="'Noto Sans KR', Arial, sans-serif" font-size="22" fill="#90caf9">시청률 11.1% · 44개국 TOP 10 · 화제성 1위</text>
  <!-- 태그들 -->
  <rect x="80" y="453" width="160" height="36" rx="18" fill="white" fill-opacity="0.10" />
  <text x="160" y="476" font-family="'Noto Sans KR', Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">입헌군주제 로맨스</text>
  <rect x="254" y="453" width="130" height="36" rx="18" fill="white" fill-opacity="0.10" />
  <text x="319" y="476" font-family="'Noto Sans KR', Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">금토 드라마</text>
  <rect x="398" y="453" width="110" height="36" rx="18" fill="white" fill-opacity="0.10" />
  <text x="453" y="476" font-family="'Noto Sans KR', Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">16부작</text>
  <!-- 출처 -->
  <text x="80" y="570" font-family="'Noto Sans KR', Arial, sans-serif" font-size="18" fill="white" fill-opacity="0.4">ambitstock.com  |  2026.04.16</text>
</svg>
