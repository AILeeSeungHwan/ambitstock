<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d47a1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a73e8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)" />
  <rect x="0" y="0" width="1200" height="630" fill="rgba(0,0,0,0.2)" />
  <!-- Title -->
  <text x="600" y="110" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#FFD700" text-anchor="middle">티빙 vs 왓챠 콘텐츠 강점 비교</text>
  <!-- TVING box -->
  <rect x="60" y="150" width="500" height="340" rx="16" fill="rgba(255,255,255,0.08)" stroke="#42a5f5" stroke-width="2"/>
  <text x="310" y="200" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">티빙</text>
  <text x="310" y="250" font-family="Arial, sans-serif" font-size="24" fill="#FFD700" text-anchor="middle">tvN · OCN 드라마 실시간</text>
  <text x="310" y="295" font-family="Arial, sans-serif" font-size="24" fill="#e0e0e0" text-anchor="middle">파라마운트+ 콘텐츠 포함</text>
  <text x="310" y="340" font-family="Arial, sans-serif" font-size="24" fill="#e0e0e0" text-anchor="middle">스포츠 중계</text>
  <text x="310" y="385" font-family="Arial, sans-serif" font-size="24" fill="#e0e0e0" text-anchor="middle">예능 · 오리지널 드라마</text>
  <text x="310" y="440" font-family="Arial, sans-serif" font-size="22" fill="#bbbbbb" text-anchor="middle">월 5,500원~17,000원</text>
  <!-- WATCHA box -->
  <rect x="640" y="150" width="500" height="340" rx="16" fill="rgba(255,255,255,0.08)" stroke="#FFD700" stroke-width="2"/>
  <text x="890" y="200" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">왓챠</text>
  <text x="890" y="250" font-family="Arial, sans-serif" font-size="24" fill="#FFD700" text-anchor="middle">영화 라이브러리 폭넓음</text>
  <text x="890" y="295" font-family="Arial, sans-serif" font-size="24" fill="#e0e0e0" text-anchor="middle">독립영화 · 클래식 · 아트하우스</text>
  <text x="890" y="340" font-family="Arial, sans-serif" font-size="24" fill="#e0e0e0" text-anchor="middle">취향 기반 추천 시스템</text>
  <text x="890" y="385" font-family="Arial, sans-serif" font-size="24" fill="#e0e0e0" text-anchor="middle">숨겨진 명작 발굴</text>
  <text x="890" y="440" font-family="Arial, sans-serif" font-size="22" fill="#bbbbbb" text-anchor="middle">월 7,900원~12,900원</text>
  <!-- Footer -->
  <rect x="0" y="570" width="1200" height="60" fill="rgba(0,0,0,0.4)" />
  <text x="600" y="608" font-family="Arial, sans-serif" font-size="22" fill="#bbbbbb" text-anchor="middle">R의 필름공장 | ambitstock.com</text>
</svg>
