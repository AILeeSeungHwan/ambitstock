<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e53935"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Shattered glass effect -->
  <line x1="850" y1="0" x2="950" y2="630" stroke="rgba(229,57,53,0.15)" stroke-width="1"/>
  <line x1="900" y1="0" x2="1000" y2="630" stroke="rgba(229,57,53,0.1)" stroke-width="1"/>
  <line x1="950" y1="0" x2="850" y2="630" stroke="rgba(255,107,107,0.12)" stroke-width="1"/>
  <line x1="1000" y1="100" x2="800" y2="500" stroke="rgba(229,57,53,0.08)" stroke-width="1"/>
  <line x1="750" y1="0" x2="1100" y2="400" stroke="rgba(255,107,107,0.06)" stroke-width="1"/>
  <!-- Question mark watermark -->
  <text x="1000" y="400" font-family="Arial, sans-serif" font-size="300" font-weight="900" fill="rgba(229,57,53,0.06)" text-anchor="middle">?</text>
  <!-- Left accent bar -->
  <rect x="80" y="180" width="6" height="270" fill="url(#accent)" rx="3"/>
  <!-- Category badge -->
  <rect x="110" y="180" width="140" height="36" rx="18" fill="#e53935" opacity="0.9"/>
  <text x="180" y="203" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">영화 추천</text>
  <!-- Main title -->
  <text x="110" y="290" font-family="Arial, sans-serif" font-size="76" font-weight="900" fill="white">반전 영화</text>
  <text x="110" y="380" font-family="Arial, sans-serif" font-size="76" font-weight="900" fill="url(#accent)">추천 TOP 10</text>
  <!-- Subtitle -->
  <text x="110" y="430" font-family="Arial, sans-serif" font-size="24" font-weight="400" fill="rgba(255,107,107,0.8)">결말에 소름 돋는 영화 — 스포일러 없이 추천</text>
  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="rgba(229,57,53,0.12)"/>
  <text x="600" y="608" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,107,107,0.6)" text-anchor="middle">식스센스 · 파이트클럽 · 올드보이 · 유주얼서스펙츠  |  ambitstock.com</text>
</svg>
