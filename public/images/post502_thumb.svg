<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg502" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0033"/>
      <stop offset="55%" stop-color="#3a006f"/>
      <stop offset="100%" stop-color="#1a0033"/>
    </linearGradient>
    <linearGradient id="accentGold502" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#f5d76e"/>
    </linearGradient>
    <linearGradient id="accentPurple502" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#ce93d8"/>
    </linearGradient>
    <radialGradient id="glow502" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9c27b0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1a0033" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg502)"/>
  <!-- Radial glow center -->
  <ellipse cx="580" cy="315" rx="500" ry="280" fill="url(#glow502)"/>
  <!-- Decorative crown motif (top center-right) -->
  <!-- Crown base -->
  <rect x="870" y="290" width="220" height="12" rx="6" fill="#c9a227" fill-opacity="0.30"/>
  <!-- Crown peaks -->
  <polygon points="880,290 900,240 920,290" fill="none" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.45"/>
  <polygon points="940,290 960,215 980,290" fill="none" stroke="#f5d76e" stroke-width="2" stroke-opacity="0.55"/>
  <polygon points="1000,290 1020,240 1040,290" fill="none" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.45"/>
  <!-- Crown jewels -->
  <circle cx="960" cy="222" r="8" fill="#c9a227" fill-opacity="0.60"/>
  <circle cx="900" cy="247" r="5" fill="#f5d76e" fill-opacity="0.45"/>
  <circle cx="1020" cy="247" r="5" fill="#f5d76e" fill-opacity="0.45"/>
  <!-- Decorative ring accents -->
  <circle cx="960" cy="330" r="80" fill="none" stroke="#c9a227" stroke-width="0.8" stroke-opacity="0.18"/>
  <circle cx="960" cy="330" r="110" fill="none" stroke="#9c27b0" stroke-width="0.8" stroke-opacity="0.15"/>
  <!-- Diagonal ornamental lines (right side) -->
  <line x1="860" y1="400" x2="1100" y2="180" stroke="#c9a227" stroke-width="0.7" stroke-opacity="0.12"/>
  <line x1="860" y1="450" x2="1100" y2="230" stroke="#c9a227" stroke-width="0.7" stroke-opacity="0.10"/>
  <!-- Accent vertical bar -->
  <rect x="80" y="155" width="7" height="320" fill="url(#accentGold502)" rx="3.5"/>
  <!-- Badge: 드라마 추천 -->
  <rect x="108" y="155" width="190" height="40" rx="20" fill="url(#accentGold502)"/>
  <text x="203" y="175" font-family="'Segoe UI','Malgun Gothic',Arial,sans-serif" font-size="18" font-weight="700" fill="#1a0033" text-anchor="middle" dominant-baseline="middle">드라마 추천</text>
  <!-- Main title: 재혼황후 -->
  <text x="108" y="310" font-family="'Segoe UI','Malgun Gothic',Arial,sans-serif" font-size="118" font-weight="900" fill="url(#accentGold502)" letter-spacing="-3">재혼황후</text>
  <!-- Sub title: 신민아 × 주지훈 -->
  <text x="108" y="388" font-family="'Segoe UI','Malgun Gothic',Arial,sans-serif" font-size="46" font-weight="700" fill="url(#accentPurple502)" letter-spacing="1">신민아 × 주지훈</text>
  <!-- Description line -->
  <text x="108" y="438" font-family="'Segoe UI','Malgun Gothic',Arial,sans-serif" font-size="24" fill="#e1bee7" letter-spacing="0.5">판타지 로맨스 대작 · 웹소설 원작 · 2026 기대작</text>
  <!-- Bottom bar -->
  <rect x="0" y="572" width="1200" height="58" fill="#000" fill-opacity="0.40"/>
  <rect x="0" y="572" width="1200" height="3" fill="url(#accentGold502)"/>
  <text x="600" y="604" font-family="'Segoe UI',Arial,sans-serif" font-size="19" fill="white" fill-opacity="0.60" text-anchor="middle" dominant-baseline="middle" letter-spacing="3">ambitstock.com | R의 필름공장</text>
</svg>
