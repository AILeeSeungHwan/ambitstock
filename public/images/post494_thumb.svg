<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e50914;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e50914;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Decorative elements -->
  <circle cx="1050" cy="80" r="220" fill="rgba(255,255,255,0.04)" />
  <circle cx="950" cy="500" r="180" fill="rgba(0,0,0,0.20)" />
  <circle cx="50" cy="150" r="130" fill="rgba(255,255,255,0.03)" />
  <!-- Netflix N shape hint -->
  <rect x="80" y="80" width="8" height="80" fill="rgba(255,255,255,0.6)" />
  <line x1="88" y1="80" x2="138" y2="160" stroke="rgba(255,255,255,0.6)" stroke-width="8" />
  <rect x="138" y="80" width="8" height="80" fill="rgba(255,255,255,0.6)" />
  <!-- Badge -->
  <rect x="160" y="84" width="140" height="44" rx="22" fill="rgba(255,255,255,0.18)" />
  <text x="230" y="112" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">드라마</text>
  <rect x="318" y="84" width="130" height="44" rx="22" fill="rgba(255,255,255,0.18)" />
  <text x="383" y="112" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">2026</text>
  <!-- Main title line 1 -->
  <text x="80" y="240" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="90" font-weight="900" fill="white" letter-spacing="-2">넷플릭스 2026</text>
  <!-- Main title line 2 -->
  <text x="80" y="340" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="66" font-weight="900" fill="#FFD600" letter-spacing="-1">한국 오리지널 기대작</text>
  <!-- Divider -->
  <rect x="80" y="370" width="560" height="4" rx="2" fill="rgba(255,255,255,0.3)" />
  <!-- Subtitle -->
  <text x="80" y="425" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="400" fill="rgba(255,255,255,0.90)">올해 꼭 봐야 할 시리즈 · 영화 총정리</text>
  <!-- Highlight line -->
  <rect x="80" y="480" width="560" height="60" rx="10" fill="rgba(0,0,0,0.35)" />
  <text x="100" y="518" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="22" fill="rgba(255,255,255,0.85)">이창동 · 송혜교·공유 · 성난사람들 시즌2</text>
  <!-- Site label -->
  <text x="1120" y="600" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="20" fill="rgba(255,255,255,0.4)" text-anchor="end">ambitstock.com</text>
</svg>
